front:
  text: 序憶昔余埀髫當丁丑冬從石頭先師大中丞余公問易武林西溪之橫山峕放舟過京口望一峰孤聳大江險怪崚嶒盤鬱蒼翠訊之知為金山也誦樹影中流鐘聲兩𡶨之句輒神往久之辛卯歲淂接天𨺚鐵舟禪師一見心契未幾師即受潤城蕊亭陳公之請繼席金山祖庭余益深嚮慕竊冀咨扣方丈兼詣山中一博曠觀而竟未能也惚恍至丙辰夏望前一日始買一葉舟造焉師為烹中泠泉歡然道故設榻古曉坣東縱談世出世之暇出所輯金山志略見示余焚香展對適風雨淹留為之三宿卒讀而拜手言曰凡天下名山各有紀載師于兹首標形勝獨表祖位綱宗旁搜諸名賢佳話軼事以暨歷代碑記古文辭賦詩歌無不悉收入山者不待縷詢其大端己列指掌即聞風相思者亦不妨臥游如歷驚濤駭浪身峙龍門三拄中旨哉是可藉金山以說法矣師蓋嗣法南澗箬老人親自堂奧中來其雷電之機用氷雪之心胸作為出風入雅之撰述良有以哉或云金山拳石耳似未足誇異余則不然大抵域內山在水中者不可勝數其最著近如采石之翠螺洞庭之縹眇嶽陽之君山稍遠則普陀之洛伽再則神山之十洲三島香水之須彌約略止矣而蓬萊亦有時三見清淺噫達人旦暮古今橫睇八表抑又何大小之殊視耶曩聞之先師稱前輩尊宿每以南澗老人與報恩天童諸大老為法門傑出尤歎其高韻不群余恨未獲追隨猶幸把手鐵師余往來江上將四十載今方一至止徘徊不能去師乃住持山中高座大徹堂三十餘年烟雲圍繞供養立說成書與山靈爭光余能無望洋而歎哉是為序南村法弟子大綱張㧾拜手題于龍游之古曉堂張㧾之印僧持金山志略目録卷首序山圖緣起卷一形勝建置祖堂法系記紀游碑賦敕書賜田附卷二高僧題贈紀蹟紀異彙紀序僧詩聯對詠江唐句卷三選詩唐宋元明卷四選詩明國朝金山志略目録終金山志略緣起夫山川奇秀而崒嵂無過金山若也坐於江南京口即古云南徐者也其巉巖屹立孤峙江心上達荊楚下抵蘇浙百川歸海風波洶湧四面環繞中流砥柱信不誣矣然山之居水中者不一近而金山稱最著焉肇自梁天監詔高僧寶公律師僧祐從金陵來建水陸大會極其祥瑞時號澤心寺金山之名已著至大唐得大鑑之孫靈坦禪師係則天武后之苗裔也每有異徵住錫山之巔蟒洞安禪入定蟒服歸海此禪宗開山之始四方高僧建置疉興遂為京口十剎之首而成江南名勝也貞元年間相國之子裴公重建伽藍於水際逮宋興以來幼聰公獻圖於真宗皇帝夢遊此山賜改澤心為龍遊禪寺又賜大藏一部山場田地若干頃當斯時也主法席者如達觀穎掩室開佛印元枯木成別峰印諸祖皆傑然秀出者相繼興起不翅十四五員大善知識激揚祖道說法如雲宏闡宗乘辨才無礙而名震天下嗣後高宗南渡駕臨維揚詔佛果勤祖於行在機緣稱旨賜號圜悟敕住金山為國開堂結制日一夜悟十八高賢更古曉堂為大徹禪堂法道益彰元時有衲堂心海了即休諸公說法山中任運嘉會而已歷明以來主法者稍間後先不一其文海淵公從天界遷任此山大有因緣善於視事見所賜洲田差徭煩苦躬詣朝廷疏奏蒙尚義太監力為蠲免建永安堂則差徭無擾惜乎後裔競任都綱分列為十二房矣至天泉頂目問石諸公說法一期因緣殊勝奈何解制即翛然長往而明季有蜀晉雲公若氷法師住靜十有餘年已為講席國朝鼎興始公議敦請先師箬菴問和尚乃圜祖第二十代孫也於戊子春進山開法衲子雲興戶無納履至此又見一番崇勝矣命余監寺三年後交謝本山闔山諸耆德偕護法陳蘂亭諸公恐新興祖庭又成冷落矣于是出書赴天隆請余繼席余勉就赴請於癸巳夏六月入院四方衲子聞風而至者縱不能如先師時雲集然從而開法者亦不乏人但余目擊祖堂不稱三門大殿及大徹堂傾圮兼值海波騰湧橛橛梗梗兢株苦守上不干於朝惟有待於野幸隨緣一一重而新之不覺羇迹三十餘年日久月湥得以考核詳細禪餘之暇手輯志略以歷代宗乘法脉及名賢達士高風逸韻庶顯山靈之勝不負護法之誠心也雖然有成有壞者世間相也其宗風相傳斯歷萬劫而常存又何慮乎後賢之不振而繼起開來也哉切念歷代之光明幢不昧本原之大義斯乃江南之名勝宜為天下後世傳故述而志之以備曠觀焉爾峕大清康熙二十年歲次辛酉月朔旦嗣臨濟正宗圜祖第二十一代孫行海撰行海鐵舟破浪
