body:
  text: 金壇綏菴居士蔣超較正嗣祖比丘鐵舟行海修輯楚潭參學門人超智編次高僧目録梁志公禪師梁僧祐律師唐裴頭陀宋道月禪師宋幼聰禪師元長溪深禪師元元叟端禪師元月江印禪師明旅泊問禪師明縉雲禪師明空滿禪師明若氷法師高僧寶志梁釋寶志金陵人姓朱少出家止京都道林寺師沙門僧儉修習禪觀至宋大始初忽如僻異居止不常飲食無度跣行街巷執一錫杖杖頭掛剪尺鏡布於齊建元中稍見異跡先言後驗士民咸敬事之武帝謂其惑衆收獄又見景陽山猶有一志與七僧俱常分身三處應供帝知師供侍焉出入禁內求雨雨降食魚魚活上問弟子煩惑未除何以治之志云十二又問十二之旨志云在書字時節刻漏中又問何以淨心修習志云安樂禁如是提持本色家風後奏帝撰水陸儀文天監同祐律師於金山大會至神化日葬鐘山之獨龍阜神奇莫測其事甚繁備載本傳僧祐梁釋僧祐本姓俞父母世居建業年數歲入建初寺瞻禮踴躍樂道不肻還家父母憐其志師事僧範年十四父密為訪婚祐知避至定林投法達法師師亦戒德精嚴及年滿具戒執操堅明受業於法頴頴乃一時名匠為律學所宗祐乃竭思鑽研遂大精律部有邁先哲為帝王見重講律聽衆常滿萬指凡獲信施修葺建初定林繪繕像好武帝臨川王知師年衰足疾聽其乘輿入大內為六宮受戒天監四年奉詔金山證明水陸儀文極徵祥瑞十七年五月二十六日卒於建初寺春秋七十有六窆於開善定林之舊墓注有律學諸部廣行於世焉頭陀唐裴頭陀生而頴異胎素不群乃河東裴相國休公之子也因作文送出家行頭陀行精煉形神清齊一食六時危坐後來潤之金山塔傍巖洞中每入禪觀降龍斷臂重興殿宇功成而不知所之宋相張商英題云半間石室安禪地蓋代功名不易磨白蟒化龍歸海去岩中留下老頭陀道月宋金山道月紹興中嶽飛途中得夢到山質問於師曰夜夢兩犬抱頭而言未審凶吉月曰二犬著一言乃獄字必要謹慎飛謝登舟月又囑以偈云風波亭下浪滔滔千萬留心把舵牢謹備同舟人意歹將身推落在波濤又云將軍此去莫心焦未審金牌氣怎消滾滾風波須仔細勞心把舵要堅牢飛至錢塘果被秦檜陷於風波亭下後檜知月囑語差何立提月正遇說法立候聽己月乃重整衣香問訊大衆合掌說偈曰吾年四十九是非終日有不為自己身只為多開口何立自南來我向西邊走不是佛力大幾乎落人手竟怡然坐脫幼聰宋澤心寺釋幼聰咸平初獻山圖詔遣內侍藍繼宗賜大藏經祥符五年詔改山名曰龍游天禧五年又遣內侍江德明就飾佛像給錢三百萬市术修寺寺僧求表舊名詔山曰金山寺曰龍游聰師德行人也長溪元深長溪不知姓氏往來金山有神跡焉入定仙女散花出定龍子擎鉢大有功於此山虞學士送師還山詩云長溪送到長江上千古金山是寶山晝永獻花天女下夜深持鉢老龍還薩都剌送詩諸天聽法蒼茫際萬佛埀光紫翠間我欲題詩酬道德摩崖常恐雨苔斑元叟元元叟端禪師奉旨金山水陸升座拈香云此香融五嶽之神秀五嶽莫並其高崟結九地之精英九地莫窮其深厚爇向爐中端為祝延大元世界主當今皇帝聖躬萬歲萬萬歲陛下恭願懷保小民茂昭大德本枝百世壽考萬年問答不録乃云盡不可說不可說微塵數世界是個金剛正體淨裸裸絶承當盡不可說不可說微塵數世界是個寶覺真心赤灑灑無空闕如天普蓋似地普擎如日普照如風普吹無一時不遍無一處不周無一理不圓無一事不具塵塵剎剎八面玲瓏物物頭頭十方通暢拈一莖草作丈六金身將丈六金身作一莖草腹中現百億閻浮提室內湧三萬二千獅子座七縱八橫千變萬化左之右之無可不可三世諸佛以此正體以此真心坐寶蓮華成等正覺津濟四生梯航九有六代祖師以此正體以此真心開甘露門廣度群品啓迪盲聾炳耀癡昧奕世人王帝主以此正體以此真心為生民立極為世開太平基拯黎元於塗炭措天下於盤石大元世界主當今皇帝以此正體以此真心克紹丕圖纘登大寶百億須彌盧百億香水海日月所照風雨所至悉禀威靈咸歸化育乃至此日特頒聖旨敦遣使臣就金山古澤心寺照依梁武帝科儀修設天地冥陽水陸大會七晝夜爇種種香然種種燈營種種上妙飲食設種種上妙服御金銀珊瑚真珠瑪瑙種種上妙珍寶而為供養命僧一千五百員披轉三藏五乘十二分祕典真詮權也實也頓也漸也半也滿也偏也圓也交光相羅如寶絲網上以翊衛皇圖下以資培民本徑山臣僧行端與禪教律三宗耆年碩德以此正體以此真心欽奉綸言高升寶座闡揚諸佛無上奧旨發揮諸佛無上祕傳若幽若顯若聖若凡若飛若潛若動若植普仗良因均霑妙利四方消炎沴之虞萬姓樂耕桑之業同躋仁壽共享升平當此之時理周事遍果滿功圓直下無私一句畢竟如何擎展擊拂子云化行舜日山川外人在堯天雨露中復說偈云執尺量虛空終難究其數持蠡測海水豈解知其源吾君本心體廣大亦如是欲求其邊際畢竟不可得吾君之壽量與此心體同欲求其窮極是亦不可得吾君之福源與此壽量同欲求其窮盡是亦不可得太后皇太子嬪妃諸眷屬心體及福源等無有差別一塵一佛剎一剎一釋迦各現廣長舌共說如上事百千萬億中亦不能及一天人群生類地獄鬼畜等十方諸有情三界衆含識當知此心體本來相如是月江元月江印禪師奉旨金山寺水陸升座普說僧問堯風蕩蕩如天濶舜日囦囦似海深法施門開無壅塞三途八難盡超升朝宰臨筵請師說法師云天無私蓋地無私載進云梁武製文於曩日我皇今日再敷揚師云聖人無兩心進云昨日金鏗明碧落今朝法鼓震玄音師云見聞明歷歷我法妙難思進云與麼則皇道與佛道並行也師云知恩方解報恩師乃云如來往昔為衆生修治法海無邊行有如沛澤清炎暑普滌衆生煩惱熱所以乘大悲願力示現世間為三界大師四生慈父如優曇華時一現爾或於一毫端現寶王剎坐微塵裏轉大法輪或為轉輪聖王王四天下千子圍繞七寶莊嚴壽八萬歲飛行自在所向無礙其國豐樂人民熾盛威德特尊無有為比是皆大悲願力中之所發現所以道大悲願力如大海甚深無底大悲願力如太虛空廣大無際大悲願力如大日輪升于虛空大悲願力如須彌山普雨衆寶大悲願力如如意珠滿衆生願大悲願力如世明燈普照一切大悲願力猶如高蓋普蔭群生我佛如來以大悲願力為體因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野之中有大樹王根若得水枝葉華果悉皆繁茂菩提樹王亦復如是一切衆生而為樹根諸佛菩薩而為花果若諸菩薩以大悲水饒益衆生則能成就諸佛智慧花果若諸菩薩以大悲心饒益衆生則能成就阿耨菩提是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺故我大元佛心聖人與釋迦如來轉輪聖王同一根本同一枝葉亦乘大悲願力示現世間作大國王為世界主允文允武克哲克明扆法埀永視四海衆生如赤子金輪統御攝十方剎土為一家具十地菩薩之身心超四輪王之壽量萬機之暇留心佛法以正法治民故佛教倍前光明熾盛以大悲心饒益衆生開甘露門廣度群品由是於楊子江建金山萬僧之海會修水陸無礙之大齊披閲五千四十八卷尊經講演教律直指難思之妙法以百億日月而為燈燭使一切衆生得證光明三昧門故以百億須彌而為香饌使一切衆生悉皆飽滿得證法喜禪悅樂故以百億香水海而為醍醐酥酪使一切衆生頓息饑虛得入如來清淨法海故以百億四天下七寶而為布施使一切衆生永離貧苦皆得如意富樂故以過現未來百千萬億恆河沙微塵數諸佛菩薩而為眷屬使一切衆生得依怙善知識故以三千大千世界而為經卷使一切衆生常轉如是經故上窮有頂下極空輪若幽若顯咸脫於苦輪曰天曰人皆承其恩力莫不皆從佛心聖主清淨微妙大悲願力之所流出上合諸佛本覺妙心下與一切衆生同一悲仰以此祝聖壽壽如妙高不動之山以此延聖福福等藏甚深之海以此治國家則民康物阜以此平天下則海晏河清百億劫之罕逢十方國之希有何異釋迦出世彌勒降生恆河沙界盡入提封九十六種咸歸正化巍巍乎蕩蕩乎不可得而稱量不可得而思議只今君臣慶會佛法光輝知恩報恩作麼生道兩輪日月無私照一統乾坤樂太平復舉梁武帝夢神僧告曰六道四生幽囚者衆何不建水陸大齊而濟拔之帝既寤詔十大高僧披尋大藏撰成儀文始於金山建此大會於初夜分悉停燈燭帝親臨筵禱曰若此儀文理協聖凡願我拜起燈燭自明如未得聖意燭暗如故帝一拜燈燭皆明二拜宮殿震動三拜天雨寶花當時靈異不可勝數至於歷代修建顯驗尤多當今佛心天子以梁武之心為心特降御香七寶練縀修設齊供建此大會宰相百官光臨法會諸山碩德共闡玄音凡聖混融人天交接直得娑竭羅龍王從海湧出親獻寶珠天帝釋空中雨花殷勤贊嘆上來臣僧升于寶座舉唱宗乘所萃鴻因端用祝延天算復成一偈堯八采輝寰宇舜目重瞳照四方紫金山頭日卓午大千沙界仰恩光久立尊官伏惟珍重旅泊明旅泊老人箬菴問禪師應七衆請建水陸大會升座僧問踢翻滄海大地塵飛喝散白雲虛空粉碎即令拔濟水陸幽冥向何處安身立命師云剎竿頭上仰蓮心進云恁麼則棒頭指處明如日爇向爐中幾個知師云幸得闍黎共證明問如何是金山境師云赫日炎天飛片雪進云如何是境中人師云汗雨淋淋問萬仞峰頭獨足立百尺竿頭撒手歸如何是萬仞峰頭師云劍閣高千仞夜行人不知進云天上有星皆拱北人間無水不朝東師云又與麼去也乃云盡世界是個寶華王座塵塵剎剎滿目全彰窮億劫只這不壞正身歷歷明明更無遮護乘此座據此身悲濟四生梯航九有所以道天人群生類咸承此恩力以此恩力故無一佛不成無一生不度無一佛土不該無一微塵不具無苦不息無樂不極此心不昧諸願恆圓乃佛乃祖開大方便門若聖若凡同遊正覺海山僧今日秉此願輪合寺勤舊竭此心力遵依古制修設天地冥陽水陸大會半月日晝夜於中無一佛事不與身俱無一纖塵或離本座一香一花一燈一供一歌詠一讚唄一經一佛一字一句如帝網光如摩尼色交光相羅互融周攝到者裏不可說不可說微塵世界中或幽或顯或暗或明一切沉溺苦趣衆生何啻如日並照如風普吹達性本空一真獨現會中莫有同相證明者麼不見道處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧秋驀喝一喝卓拄杖云但能當念空諸有共轉如來正法輪縉雲公諱法肇字縉雲俗姓高氏蜀之蓬州人也髫齔芟染於本州鳳凰寺年十六南詢參歷講肆受戒於憨山大師聽講於蓮峯二楞輒自嘆曰正法道要唯在解脫拘滯文字其能濟乎獨走少室扣無言宗主執侍三年盡獲其旨無言授以偈曰萬戶俱開類廣寒一條官路透長安如來心印分明記珠付摩尼看走盤嗣是飛錫南徐住金山之大徹堂往來縉紳士人樂與之遊亦不以提唱為己任時萬曆之丙辰也公以金山為寶公建興水陸之地而像法久湮乃經營變相卷軸六十四及搜葺儀文建水陸閣以奉像設崇禎五年壬申七月十七子夜說偈而逝壽四十七臘三十有九闔山哀切建窣堵波於寶蓋山空滿公東海萊州人天性至孝不露姓氏父母歿日廬墓三年遂脫白苦修以報親恩志慕海島金山寺先住朝陽洞長坐不卧默持楞嚴祕密不記其數而得一心不亂純一無雜之境後閲法華得悟開佛知見四句偈凡隨喜者有問即答過後有應次移妙峯之絶巘以數席蓬僅避風雨髮長不剃足不履地因感四衆建無梁殿法華樓多寶塔幻出可觀又見山中藏經多缺少者乃往北都同徒如然苦行募藏時天下請藏者蝟集唯公德行所感大內降香賜紫得全藏還山更建蓮華閣而供奉焉每祝願雙親生阿斯天仙足矣雖埀耋耄不言壽臘可謂高尚其志翰林王肻堂為之記後無病吉祥而逝藏於竹林之西談家山也若氷公諱福城字若氷四川渠縣趙氏子也稚性沉默凝靜端嚴八歲落䰂縣之羅漢寺依叔父映天為徒敏而好學年滿遊方詣高原於龍岩山得親相宗染指教乘三年辭去二十有六遂抵金陵浮沉講席受具人宥律師遍叩名宿四十始到京口悟心法主深研悟旨嗣法受衣喜止金山與縉雲友蒼諸公互相砥礪公獨鄭重儀範忽縉雲翛然揖世輿議請住大徹堂十有餘年得以坐究龍藏博通內典四衆請弘唯識楞嚴於爪潤闡法華於本山言含妙義梵音清朗見者聞者無不皈依至六十一目擊世運更遷生死凋落閉關八公洞溟心內照樂意禪觀蓋不忘其所自順治辛丑三月初十示微疾三日遂喚弟子德本等云我在關中神情怡悅冥念純一且付衣有人豫亦無愧於兹矣念佛數聲向西蟬蛻享年七十一臘六十三僧俗慕其高風建塔於錦屏山之陽也題贈題贈扁額乃名賢達士目擊名藍勝境與高僧宿德酬唱機宜輒有命題其世出世間凡所有相豈能保其長久乎然時移事遷興替不同此護法真心似不忍忘遂録存以志山靈之永好云行海識法門祕藏妙慧一泓吳泰來題并書天宮寶藏樊尚璟題潮梵和音秦鏡題筏濟無邊易水劉大川題鎮海禪宗順治甲午張思明題篆苦海慈航西蜀蕭雲舉題篆自在法門江都楊九鵬題并書禪宗寶藏申時行題另是一天陳國經為大徹堂題中流砥柱天水胡纘宗題丹徒令藍田李本書飛巖驚幬西雒王鐸題天懸柱石李率泰題龍游禪寺成化癸卯明遼王書大雄寶殿成化癸卯明遼王書洄瀾矗漢張思明題形似盤龍越人柴際題佛印山居虞淳熙題周天球書乾坤一覽行人內江高梅題水月空明智烺題𤎆雨奇觀宋淳熙戊戌主僧藴衷建弘治庚戌郡守鄭傑命工重建于北塔左吐納江波李植題雲水樓臺楊寀題破浪開山河東塗廓題長嘯江天太守錢升題金沙江月王懩題千古雄觀新安汪廷納題篆江山如畫鄭貴京題雪崖氷柱張翮題江心坐快朱啓元題有山此僧楊道寅題山水佳居越人柴棨題坡仙遺蹟黃吉士題卷石飛來空閣雷聲河東李瑾題金玉懸岩在蟒洞之旁怪石嶙峋草木罕生其赤若金其白如玉灼灼艷艷若烟霞浮空古記謂紫金浮玉者此也江山一覽在南塔右不忙處史𡎊題百八窩劉玄賜題小匡廬樂天遊匡廬見泉勝絶為之忘歸斯臺之矌有不殊也書以志之雲間張安茂書第一泉鐵溪題中泠泉隆慶戊辰春三月望七十二翁仲山王問篆羼提齊王鐸題雪洲門大徹堂堂左後臺骨依雲靜蘆中公題江聲帶雨飛苦海岸頭清世界丹徒令張文光題浪濤千古康應乾府主題佛國金湯趙庭真府主題雪山示現張瞻題俯視一氣張瑞圖相國題中流自在江山滿目皆詩料唐虞世請龍藏寶閣趙志臯題烟雨千家總畫圖仙判對天風海濤朱來遠題玉液潭懷劬題江山絶勝汪高梅題記蹟梁天監二年武帝夢神僧告曰六道四生受苦無量何不作水陸大齊以拔濟之帝覺問諸沙門無知者惟志公勸帝廣尋經論必有因緣帝即遣迎大藏經置重雲殿積日披覽創制儀文三年而成乃建道場于金山寺命諸沙門依式修設僧佑律師宣文大彰感應佛祖統記唐咸亨中長安法海寺英禪師夕坐方丈忽異人來謁曰大覺寺吳僧義濟藏金山水陸儀文盍願往求之于山北寺修設言訖而隱英遂訪義濟而果獲焉遂設大會廣濟孤爽葦江集唐光啓中金山寺西石磯上有異獸狀如牛無角色黃而毛長可數十丈引首望城中久之復回顧廣陵寺僧觀者漸多乃躍入水波濤洶湧如衆車馬聲移刻乃止稽神録金山萬川東注一島中立丹輝碧映攬數州之奇于俯仰間而下有蟠龍之宮神靈之府實堪輿間一奇絶處也洞天記金山之勝非獨據江瞰海並楚之衝而演吳之要地其浮江之檻負崖之屋椽摩楝接環山四出有以夸天下者也曾子固記潤州大江本與楊子橋為對岸瓜洲乃江中一渚耳潮水昔通揚州城中唐李紳詩云鸕鷀山頂片雲晴揚州城裏見潮生大曆後潮始不通今瓜洲與楊子橋相連自楊子距江三十里瓜洲以閘為限雖楊子橋亦不至矣山有佛寺建於晉太寧中名澤心寺至唐有裴頭陀斷臂立誓重開山焉宋蘇子瞻過潤留寺數日一日值佛印禪師挂牌與弟子入室子瞻至方丈見之印云內翰何來此間無坐處公曰暫借和尚四大作禪床印曰山僧有一問若答得即便請坐道不得即輸腰間玉帶公欣然曰便請師曰山僧四大本空五藴非有居士向甚處坐公不能答遂留玉帶印却贈以雲山衲衣公乃賦二絶云病骨難堪玉帶圍鈍根仍落箭鋒機會當乞食歌姬院故與雲山舊衲衣又此帶閲人如傳舍流傳到我亦悠哉錦袍錯落真相稱乞與佯狂老萬回五燈寺有薦慈塔宋元符中丞相曾布用西府俸所建以薦其先者元豐末子瞻得請歸耕陽羡舟次瓜步以書抵金山了元曰不必出山當如趙州接趙王元得書徑來東坡迎笑問之元以偈答曰趙州當日少謙光不出山門接趙王爭似金山無量相大千都作一禪床宋佛印禪師遊京師天子以高麗所貢磨衲賜之客有見而歎曰嗚呼善哉未曾有也嘗試與子攝其齊袵循其鉤絡舉而振之則東盡嵎夷西及昧谷南放交趾北屬幽都紛然在吾針孔線蹊之中矣佛印笑曰甚矣子言之陋也吾以法眼視之一一針孔有無量世界滿中衆生所有毛竅所衣之衣針孔線蹊悉為世界如是展轉經八十反吾佛光明之所照與吾君聖德之所被如以大海注一毛竅如以大地塞一針孔曾何嵎夷昧谷交趾幽都之足云乎當知此衲非大非小非短非長非輕非重非厚非薄非色非空一切世間折膠墮指此衲不寒鑠石流金此衲不熱五濁流浪此衲不垢劫火洞然此衲不壞云何以有思惟心生下劣想耶蘇軾聞而贊之曰匣而寶之見衲而不見師衣而不匣見師而不見衲惟師與衲非一非兩渺然視之蟣虱龍象李龍眠畫子瞻照容弟子由贊佛印像亦龍眠筆也留金山寺後東坡過金山自題曰心似已灰之木身如不繫之舟問汝平生功業黃州惠州瓊州蘇子瞻以怪石供佛印佛印以其言刻諸石蘇子聞而笑曰是安所從來哉豫以餅易諸小兒者也以可食易無用豫既足笑矣彼又從而刻之今以餅供佛印佛印必不刻也石與餅何異參寥子曰然供者幻也受者亦幻也刻其言者亦幻也夫幻何適而不可遂舉手而示蘇子云拱此而揖人人莫不喜戟此而詈人人莫不怒同是手也而喜怒異世未有非之者也子誠知拱戟之皆幻也則喜雖存而根亡刻與不刻無不可者蘇子大笑曰子欲之耶亦以供之東坡集金山一名獲符山亦名頭陀岩按記謂因李錡奏而易名然建中間揚州陳少游以甲士臨江韓滉總兵臨金山與少游會則建中時已名金山非自錡始梁天監四年即金山修水陸會則金山之名殆非始于建中明矣頭陀記金山據海上游而兹亭據山絶頂當夫日月踴出如金丸躍冶閃爍激射沉影浮光變態無極若乃陰霾霧雨天水蒼茫上下玄同如鴻濛一氣混沌未分時或長風驟來驚濤黏天怒波拍空山根搖而欲浮地勢振而若飛恍如神鰲揚鬐島嶼騰躍憑欄俯視目眩心顫海之大觀于斯為極舊有亭曰吞海嗣山曹公始復之彭國光吞海亭記東坡大風留金山兩日云塔上一鈴獨自語明日顛風當斷渡于湖詩云塔上一鈴語湖頭三日風用坡語也偶談楞伽室在妙高臺右宋張安道自翰林學士出守滁州一日入琅琊山藏院呼梯梯梁得匣發之乃楞伽經也恍然覺前身乃知藏僧寫楞伽未終而化即續書殘軸筆跡宛然如昔元豐末蘇軾過南都安道出此經授軾且以錢三十萬使鏤板印施江淮間軾曰此經在他人猶為希世之寶况于公乎請家藏為子孫無窮之福金山主僧了元謂軾曰印施有盡若書而刻之則無盡乃為書之元使侍者曉機走錢塘求善工刻之板以為金山常住乾道中主僧寶印即軾寫經處扁曰楞伽室子瞻集舒王宿金山寺賦詩一夕而成長句妙絶如曰天多剩得月月落聞歸鼓又曰乃知像教力但渡無所苦之類如生成山谷在星渚賦道士快軒詩點筆立成其略曰吟詩作賦北窗裏萬言不及一杯水願得青天化為一張紙其筆端三昧遊戲自在也冷齊夜話宋翰林蘇紳公嘗題金山一聯云僧依玉鑑光中住人踏金鰲背上行時公方舉大科識者以人踏金鰲背上行乃榮入玉堂之兆已而果然公位止於內相豈亦詩之讖耶青箱雜記楊子江心水號中泠泉在金山寺傍郭璞墓下最當波流險處汲取甚艱士大夫慕名求以瀹茗金山佛印與人談笑間化去吳人鄭夷甫聞之喟然嘆曰既不得壽得如此去夫復何憾哉乃從僧授楞嚴忽有所省曰死生之理我知之矣後預知時至沐浴更衣屹然立化夢溪筆談東坡詩云江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水蓋遊金山與江神指水為盟耳邵半江題陳圖南小像云磐陀石上淨無塵嶽色江聲共此身莫怪吳儂渾不醒百年俱是夢中人外紀宋咸平初澤心寺僧幼聰獻山圖詔遣內侍藍繼宗賜大藏經祥符五年詔改山名龍游天禧五年又遣內侍飾佛像給錢三百萬市木修寺寺僧求表舊名詔山曰金山寺曰龍游元至治中僧應深即寺之右建大閣焉上嚴萬佛之像下肖五百羅漢之容文帝潛邸之日登是閣壯深締搆雄偉出帑金成佛像以贊之至順中深奉佛像以進上曰閣中萬佛已莊嚴乎對曰像具未完即出內府寶鈔五萬緡賜之名其閣曰萬壽元虞集記云南徐古治限大江之堧受衆川之委東趨而將至于海其浸汪洋以無涯其流舒肆而莫止拳然屹立江中以迎其衝者金山也圖經金山灘瀨下多黿鼉窟宅每泝洄順流噞喁沉浮或近或遠出沒浪花間頗類馴擾可玩故子瞻詩有扣瀾見黿鼉揚首意自得之句名勝録萬壽閣記云一念慮之善一佛之全體也一號令之善一佛之大用也譬如瞻日于天人各見日如日視己不知所見一日也觀月于水人各見月如月視己不知所見同一月也散之諸有名之為萬歸之於無其實一佛也一佛萬佛也元虞集客有問此山何以名金有云昔裴頭陀開山得金故名客笑曰若然則銀山是得銀錫山是得錫也殊不曉出自佛書大地外有香水海以縈之海水播溢無常天帝設四大七金山浮游於海以鎮定之以此山似之故名之又何疑哉金山江中有毒龍變幻不出船由真州渡必欲渡此江須大祭乃得否則必覆後以佛力遣去金山從北岩下一穴能容人出入中空洞而上數丈石床如案一洞大方二丈四面風生不可久留金山中泠水比他水每甌重錢腹瀉者飲一甌頓止煮茶無宿垢江心龍門水深二百丈似與郭璞墓相連實不連勢亦孤絶也金山居大江中逈然孤秀詩意難盡故孫張詩為第一羅隱亦云老僧齊罷關門睡不管波濤四面生日記客又問何為浮玉此出仙經上仙居浮玉山朝上帝則山自浮去因金焦俱在水上似之故贈名也楊升菴云郭璞善地理凡遇吉地必剪爪髮以瘞之故郭璞墓所在皆有漙無際住持金山性慧博記士大夫至必曰金山主人嘗建毗盧閣祖師殿及修陂塘壩閘以利寺業賦役之免多其用力全體菴能詩重建吞海中泠二亭學士黃淮書扁保定候留玉帶李贊皇居廊廟日有奉使京口者托取中泠水其人醉而忘之泛舟至石頭城方憶乃汲江中歸京獻之李飲之嘆訝非常曰京口水味有異于頃歲矣此頗似石頭城下水其人謝過不隱廣記梅聖俞山形無地接一聯絶妙尾句有味孫又有句云結宇孤峰上安禪巨浪間可以埒然移之落星湖心亦無不可律髓明王陽明年十一歲時其祖竹軒擕往京師過金山寺翁與客酒酣擬賦詩未就陽明從旁賦曰金山一點大如拳打破維揚水底天醉倚妙高臺上月玉簫吹徹洞龍眠客大驚異復賦蔽月山詩曰山近月遠覺月小便道此山大于月若人有眼大如天還見山小月更濶王文成年譜明別峰禪師洪武初奉敕住山嘗赴京賀萬壽聖節寓雞鳴寺高廟親臨寺賜詩曰命駕雞鳴訪老禪知師昔日住承天幼年參學心猶切晚歲修持操愈堅蓮發性天香馥郁月澄秋水玉團圓一毫照徹三千界何必藏身北斗邊明景泰甲戌郡守白公命住持弘霔寧諼作亭于頂或曰晦冥之朝風雨之夕雲氣往往停留其上故名曰留雲亭明慈聖光獻皇后嘗夢神人云太平宰相項安節神宗密求諸朝臣及遍詢吏部無有此姓名者久之吳充為上相瘰癤生頸間百藥不差一日立朝項上腫如拳后見之告上曰此真項安節也蔣之奇既貴項上大贅每忌人視之為六路大漕至金山寺僧了元滑稽人也與蔣相善一日見蔣即手捫其贅蔣心惡之了元徐曰冲卿在前頴叔在後蔣即大喜可談明永樂中僧道瀾創毗盧閣及兩廊洪熙改元葺大悲殿新梵像正統十一年寺燬明年都綱弘霔重建是歲敕賜藏經侍郎周忱建庫貯之主僧寧諼重葺大徹堂於中泠亭側悟心堂於妙高臺下景泰中郡守白仲賢重搆留雲亭於山之絶頂弘治八年安賢建五聖閣于毗盧閣之南往有高僧呼龍曰汝能見身乎龍即見一頭如山僧曰汝能大却不能小能入吾鉢中乎龍即入鉢中僧曰汝能出乎龍百伎莫能出僧因與之說法開其毒惡龍請降以聽法今封順濟龍王是也即本山伽藍之一自張祜吟詩後詩人閣筆孫魴復吟一詩時號絶唱然魴詩不及祜如驚濤濺佛身之句寺何其低而小哉末句仍自驚衒即天多剩得月一聯亦未為至以其亦可用之落星也燕華君題金山寺詩云濤頭風捲雪山腳石蟠虬楊升菴云唐人韓埀題金山詩當為第一張祜詩雖佳而結句終日醉曛曛已入張打油矣中泠井中梯可下須冬涸時乃可大可數丈高可二三尺以手捫銀杏樹根直立不知下至何處乃止記異唐大曆八年靈坦禪師卓錫金山山北有毒龍穴常吐氣如雲近者多病或斃師居之毒遂滅師在江北異跡甚多具在本傳神僧傳宋歐陽文忠公宿采石渡夜聞相呼之聲舟尾忽應曰參政宿此不可去公疑之至五鼓岸上馳驟有聲舟尾又呼曰如何行者答云道場不淨無所得而歸公愈異其事後遊金山以告寺僧僧曰昔者施主于寺設齊方第二筵其妻乳卧少頃腥風滅燭衆駭其異公詢其日正宿采石之夜也夜話録宋元祐間了元禪師靜夜東望忽見焦山西北五色霞光上燭星漢亘夕方滅因即于方丈搆妙高臺潛對其地今址在山畔而為層巒掩蔽焦山不望而見矣詩序元豐中本山顛五色霞光夜起達旦始滅明弘治十六年七月十八日夜僧安議卧聽江上龍舟競渡聲起視惟見空中火色熒煌自西船聲繞寺而去明旦安北渡遇覆舟之溺明成化中僧雪堂於金山閲藏本郡熊守為助糧一日疾終熊獨坐衙內忽見雪堂獨入私室頃報曰室人産一男命吏往金山探問而雪堂是日時沐浴已入滅矣金山有一巨蛇色黑其大如斗人常見橫于山巔或踐之動而去必不傷人金山有一片水銀大於席月下或將曙飛集僧屋忽不見偶一夕夜月初上時有山人孔承寵見所積柴蘆上一席如銀近而視之即颼然飛去驚問山中僧始知之金山塔時放舍利光遊客與僧頻見之金山居僧及借寓之客渡江必無傾覆之患聞神龍常默為呵護大徹禪堂僧古燈厨下一童不知何來年二十見人惟笑至齊時堂前歌舞不知所歌何言與之言世外事始肻點首知其為異人後沐浴坐化宋進士虛中王日休一日附舟至鎮江閘缺水不能行乃於金山借四經即阿彌陀經也欲校勘刊板廣傳舉筆之時右手有風疾其指自掉寫字非便豫乃舉指念阿彌陀佛與觀世音菩薩數聲禱告乞除風疾以成寫此經禱于空指遂不掉以至終帙無恙以此見佛與菩薩只在目前但人信心不至耳龍舒淨土集嘉靖六年七月初一日夜至三更忽聞霹靂一聲房屋皆震動天明以見靈觀閣外金柱樓板上劈破裏半面樓板下劈破外半面觀者皆其事莫測其理明有人多得勞疾相因傳染者數十人取病者於棺中釘之棄於水流之於江永絶傳染金山有人異之引岸開視見一女子猶活取置漁舍多得鰻魚羹啖之漸有生意病遂愈即為漁人之妻稽神録與三元參贊同金山都綱弘霔戒臘孤高成化三年二月十一日涅槃托生南京柳千戶家四歲方言忽曰我是金山寺霔僧官其父異其事令家人至金山詢問使曰其生時正是霔公入滅之期及長送能仁寺出家胎素比昔尤善江天閣一老僧號無礙司一山晨昏鐘鼓寒暑不輟常持金剛經偶渡江落水止淹半身乃誦金剛經之力也江有一老黿夜窟甘露港日窟金山岸下以就食時有一僧與黿狎客欲見之僧輒擊魚呼之即起其身四裙水蛭聚吮僧用鉗拔出百條黿快開口作聲如笑夫物之與人狎也如此金山伽藍最靈每夜巡山偶有房僧酒醉行𠒋往殿前過即拿進重責二十板遂推出其殿門仍閉如舊其僧從此改過修行後受山戒者不知其終身何如也明禪堂有僧覺源夜出經行忽見山上燈籠火炬執事儀從如上司行狀遂避於廊廡間窺其何住竟回伽藍殿不見踪跡自云莫是夢耶身心驚悸走歸白其所以始知有龍神常出巡山明佛印山居有老僧與沙彌夜禮觀音文忽一夜現丈六金身儼然是活菩薩遂感發之愈加精進明永安橋中夜分有一青臉大人徐步登岸至廊廡間見有衆人至復回橋下江而去明枕江樓老衲號江樓者虔書華嚴經是日客多回互不下樓竟至黑夜其筆放光滿樓皆明有沙彌呼老太夜了何不下樓喫飯及舉首逐深黑矣始知筆生光尤加敬信明前馬頭有二僧同提燈出恭見江面有一人上岸奪燈一僧先見即回避一僧與之相奪相奪者病故回避者幸免明崇禎四年大江漩渦中突起一獸如水牛相似逆流上行風波洶湧久之方沒清順治庚子初夏黃昏時山頂忽現大人儀容威武渾身甲胄若似乎將軍也久之向北而隱多僧目擊以為奇事清黃昏時後山東厠有一黑臉人用繩套一兵互相與奪俟後其兵認得是伽藍使者遂求祝願猶病數月免死而已清順治戊子箬菴和尚重開大徹堂法席寶塔放青白光二次兩岸漁人入寺報知至戊戌冬期寶塔又放光寺僧浩然耆宿繞山通知遂率衆出瞻禮鐵舟和尚常坐入定於樓之南窗是夜明星朗月四無人聲惟有一犬獨向冬青樹下吠之不已啓戶視之杳無影響然吠聲愈甚即曳杖出戶趂之即往天王殿走犬亦隨之而吠追至殿前如衆人下江之狀始知有在江鬼神朝山之者名山大川每皆有之己亥夏海上兵船繞山攪擾忽山頂有一員穿緑袍戴金額手執令旗四面指點遂至寧靖及求其人則無形跡始知關聖帝出現護山得以瓦全兩岸闔山皆目擊者
