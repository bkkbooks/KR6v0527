文世罕希受闡祖庭山色麗恩光千古鎮巍巍康熈二十三年十二月八日西堂明真記錄募刻紀遊陳仁錫嘗讀太史公書始知蓬萊方丈瀛洲為三山始皇好奇衷徐福語遂舉求仙問藥事心快之吾吳金焦北固名襲而實左欲為山靈拭汗及登金之妙高臺焦之吸江亭北固之三山樓青冥落地龍江無色不知一片熱世界失在何處玉免為兩金烏作雙低回於明鏡中若遠若近而琳宮紫剎飛廊舞磴為之色矜嗚呼所謂蓬萊方丈瀛洲名挂圖籍而試以此律其實無繇也即反居水下之說特福之愚始皇耳然古今遊三山者咸便帆過舫稍稍載筆延討輙以傲人是以皮相山靈貽辱非淺愚謂遊三山必未遊數年前聞風結想幾深夢寐及遊則裹歲糧攜同心一二奇書數種嗒然居之雞五喔後急奮策孤往據絕頂最高處細觀雲之往來凑合度水入林舍崖吐谷或白衣或蒼狗或橋梁或車葢姿狀萬出應接不暇日始升則廻視日所矚處隱躍晦顯遠近濃淡之奇畢在林巒相錯時及返照靜看落霞帆影出沒長江之致不全在丹金五色為奇也大雨後短衣狼狽趨亂壑重泉間觀水勢不能直行躍舞飛鳴與山爭奇于一虩之內春時花未發先課數詩商擬開時景色及爛熳離花數百武擇危樓杰搆置酒凭闌與客指點霞封綺錯之奇秋則山水本色譬猶病客乍痊動定閒靜又如醉士臥起七碗茶後也奇石露奇怪水呈怪江之形澄以遠泉之響悠以調真堪歌李青蓮絕句數首消之此葢三山之勝塲古今遊之所不及也廻視蓬萊方丈瀛洲失覈負名不可大愧耶余二十七遊洞庭庚戌遊碧雲香山又嘗五泛楊子江彌月眺三山歸則晏坐清溪時與林仙翁酣對適潤州霍公祖選補三山京口二志謬承魯豖之委集成附洞庭詩碧雲香山詩清溪詩酒仙詩各一卷質諸霍公祖曰可因併載焉碑重建吞海亭碑記明彭國光撰大江奔流萬里東入于海而金山崛起中流立江海之間于寰區稱奇絕山上下四圍墖院菴剎凡數十各有所受之景乃其絕頂有亭巋然東瞰海洋舊名吞海又此山最奇絕處亭剏不知何代我朝宣德景泰間經修者再後復傾圮殘基斷礎委諸榛莽之中久矣嗣山曹公以甲午歲奉簡書備兵江南再踰年不佞謬忝同官相繼受事先是諸臺使按竣渡江而北兩監司必相與祖餞于此公及不佞循故事其于此山歲凡一再登每徘徊千仞問其所謂吞海亭者而不可得公慨然語不佞曰金山之勝兹亭為最胡可不亟復于是檄潤州王守督毛叅軍稍稍營度計費可四千貫遂相與捐俸鳩工庀材重建焉閱月而亭成所謂巋然者盡還其故公乃屬不佞記其事余惟天下大觀無過于海金山據海上游空青無碍而兹亭據山絕頂當夫日月踴出如金丸躍冶閃爍激射沉影浮光變態無極若乃陰霾霧雨天水蒼茫上下玄同如鴻濛一氣混沌未分時或長風驟來驚濤黏天怒波拍空山根搖而欲浮地勢拔而若飛恍如神鼇揚鬐島嶼騰躍憑欄俯視目眩心顫海之大觀于斯為極故自古及今騷人墨客登眺其上往往對景抒思觸興吐奇載在三山誌中可考鏡焉乃嗣山曹公所為愀然寄慨獨有異于諸君子者公嘗與余把酒此亭因論典午之際能與江流山色競爽爭雄我朝自太祖高皇帝混一六合雍熈大業迄今二百四十年無論耕鑿之民相忘帝力即此山一草一木榮華鬯遂不見斬伐蹂躪之𡧱孰非雨露之恩所蒙被然而承平既久文恬武嬉漸歸窳惰頃者海氛倐揚載勤我師既閱五載未覩底績萬一橫窺江左我輩蒙國厚託不能滅此即山靈有知彼乃以我為非人乎噫嘻公所寄慨葢若此視昔王丞相斥新亭之淚期于戮力中原者豈不千載一轍歟以余覩公肝膽氣魄俱號絕倫即今大江以南倚公為長城豈惟江以南天下而無事則已即有事舍公其誰可屬者然則兹亭之建儻亦有深思焉獨區區覽勝云爾哉不佞固陋僭為之記既成屬長洲江令伐石丹徒龎令徙置山巔使夫登此亭者誦余之言聞公之風其于立功報國之心可以油然而奮矣公諱時聘直隸獲鹿人辛未進士嗣山其別號云王守名應麟尋擢越之觀察使龍溪人江令名盈科桃源人龎令名時雍汶上人建水陸大會碑僧應深撰皇帝纘業以來海內生民安安惟念堕墜下泉者罔克攸濟延祐改元二月乙亥嘗欽旨順母后以金山為水陸建始地特降侈儀修大齋會一七晝夜普用津利其感神光聖燈頗與常異明年八月丙戌乃再欽旨如元年例仍建水陸大會用荅內弼之勤於乎大覺聖人昔愍阿難啟請斛食其水陸要儀已具蕭帝廣以法言弘設金山齋會典儀始著皇上今原是教復眷兹山益以宗說圓音兩崇無極之鴻勳臣應深幸備灑掃罔竭涓埃謹以盛美形于聲頌勒于金石庶俾幽顯得與見聞咸遂蒙福延祐二年二月佛海慈惠禪師住持臨濟宗臣僧應深撰集賢院學士臣趙孟頫書復建水陸大會碑僧應深撰其畧曰佛道巍巍三界具瞻皇化蕩蕩萬邦咸服皇帝有以克肖之乃召有司如延祐元年例嚴備淨儀入金山古壇建水陸大會一七日始事以七月戊戌畢于乙巳用培社稷之鴻釐及津幽顯之多眾徛歟盛哉賦金山賦明盛恩撰潤有金山公子與焦山處士相遇于大江之東公子嬉嬉然有咍色詡詡然有夸容廼語諸處士曰潤自古昔郡名朱方控引全吳凌躡大江金焦並峙東西相望膾炙多口震蕩遐荒若有奚异與台並颺請各撰微用質低昂夫金山者據京口之上游界南北之中央屹橫流之砥柱亘帝都之巨坊雄跨肇於太乙嘉名錫於李唐星紀牽牛熒熒煜煜而埀耀焉勢迎長江滮滮涆涆而會交焉其東則吞吐溟渤枕倚扶桑玉山為肱爾質我相雲山作股曲阜連岡石堰儼戶樞之闔闢正屏羅物色之弛張爾焦峰以列障彼北固以為隅含谿懷谷而獻巧涴沙抱石而呈奇咸頫躬而下首可使氣而指頤和風浩蕩拂其隈初月滉瀁射其阿延暘谷之朝旭道尾閭之晨波於是乎瓊桃蚤實琪草先華奇葩眩錦雜卉流霞葛覃莫莫而蔓衍灌水萋萋而交加黃麗求友於薈蔚之岑玄鳥掠雲於𤀰瀑之涯其西則遐矚岷峨邈挹荊楚匯以潯陽阻以瓜步金陵道其脉五州袒其肩下鼻漱其腋江流突其巔龍潭峙而𡽗巇真州衍而平原流漢湯湯直瀉萬里怒濤雷奔驚湍電起大火墜於虞淵夕暉淪於濛汜於是乎秋聲淅瀝白露載零井梧凋翠崖菊敷英鴈陣驚寒於遠浦芙容倒景於滄溟木蘭梫桂椶枒杞櫹爰擢修幹載竦長條鵬鶚高騫乎雲漢猿狖長嘯乎林臯其南則百粵所屆四閩所通兩浙紓其臂三吳蕩其胸長揖會稽於逖域頫紏疊阜於邇封揚鵬星翥鴻鶴雲翱菊峰挺秀峴嶺岧嶤寶葢亭亭乎豐蔀磨笄翼翼乎清標漕渠習坎津驛通衢舳艫鱗次冠葢塵驅客子肩揮而競渡舟人楫詬以爭艤於是乎薰風薦爽水殿生凉嘉木繁陰鬱鬱蒼蒼虎兕風於氷雪之窩蛟龍沃於廻瀾之房芰荷揚頳葵榴熾赩岸幘凛而憎寒絺綌紾而忘燠其北則燕冀在望齊魯指掌徐泗孔邇淮揚接壤黃河紆帶而橫奔吕梁嶻櫱而流響挹具區之大藪鬱葐蒀之無底爰自泰而徂通衍鹽田之千里揚子之梁通其吭太乙之峰委其體穹然秋虹之麗空藐爾蟻封之突起𤓰渚作鎮天壍要津囂囂燁燁實我比隣於是乎朔風凄凄玄雲漠漠雨雪霏霏石出水落綺閣重闈煖歌燠酌雪藕氷桃互為酬酢鬱鬱盤徂徠之松猗猗撼崑崙之竹癯鶴啄寒瀨之氷梅花露先天之易娛爾歲時瞻望北極爾其體勢則鳥道陟其巔龍宮守其基滄浪流而為隍兩岸廓而為隅贔風無纖埃之集潦雨尠微津之淤伏牛彷彿浮玉依稀獲符互父名與世移爾其勝槩則金鰲中屹妙高插空善財頭陀怪石巃嵸崆㟅嶱嵑石排之山嵣𡵀岝峈裴公之岩璞墳噴薄而隱跡中泠淯而寒泉爾其梵宇則大雄西敞煇煌金碧天王伽藍前驅後翼江天乘聽潮之軒海嶽載毘盧之宅雄跨玉鑑大徹悟心三禁永安養素涵清雪月無邊烟雨化成留雲北偃吞海西憑廊腰紆折而蜿蜒簷牙高啄而崢嶸若乃日霽天晴風和雲斂朱履尋芳士女遊衍挈榼提壺登高望遠鏤壁鐫崖剝苔涴蘚估客艤八方之舟三老忽龍門之險櫓聲咿軋於中流漁唱悠揚於清淺揭寰宇之奇觀余躭樂而忘倦若乃陰風號怒浪起蜃擁波龍撼雨闇若天昏蹴若地圮神蛟鼓鬣而嗔怒江豚延頸而忭舞舟子狂呼傾檣毀櫓余亦悄然而悲肅然而怖若乃貴界公子墨客騷人探奇覽勝輝映古今感真宗之夢𥧌動文帝之哦唫英廟巽申而晉錫武皇駐蹕而來臨宋學士之解帶唐宰相之命輪金玉充棟珠貝盈垣歐蘇泝其流孫張啟其端煥爾詞林爛然文苑托兹山而並久終萬古而弗諼若乃明神降靈高僧棲跡裴陀能搆佛印善葺菑畬薦千頃之租水陸賚萬方之福豈若野人之䠥𨇨窶子之齷齪公子辭畢淟㶍欠伸切齒怒目奮臂攘衿諒處士之見屈敢怙勢而凌人金山賦明曠宗舜撰金山峩峩立彼江波其天造而地設抑神鑿而鬼磨烟雲兮繚繞星辰兮布羅日月懸於楹牗蛟龍遊於檻阿壯哉奇矣嘅夫長江萬里順流而東漰漰淼淼𣺷𣺷吼狻猊馳風騣拔坤軸轉乾釭轟轟雷逐赫赫龍從斷瞿唐之峽劈五老之峰固瞬息而千里若囊綻而矢衝由之濤珠濺而柱折飛沫灑而磯崩順騰牛渚直指吳淞滄瀛既邇合泒愈眾斯正赴家之勢窮寇之鋒將避之而恐及敢獨立以當衝兹山則亭亭閒閒突自中起立靜專壓波靡鄰援不資聲色不侈縱震撼之不驚亦中立而不倚遏長驅於破竹衝堅陣於兩臂斯不戰而屈人兮亦匹夫而秉志猶之倒孟津之戈兮潰昆陽之騎取日於虞淵兮存孤於晉祀攖孤城於睢陽走老瞞於赤壁誠文王之怒仁者之勇矣及循波羅之岸躡至信之磯觀瀾聽潮廊歩不迷乘風帶月葛巾杖藜閣則朝陽江天樓則海嶽𣷉虛眺烟雨之奇觀覽雙塔之遺墟穿𡧯徑折磐陀出藤蘿之外境登一覽之危坡蹲踲妙高之臺愒息氷雪之窩浮金湧翠嘉名不磨養素鎮濤於焉再過大觀於留雲之亭重寄醻於郭璞胡日中之不遁尤詭秘於江峩既生死之有數將陵谷之謂何考三禁之奇跡尋危巖之裴公出雪洲穿妙空橋度惺惺池瞰蒼龍覩如來之面立般若之峰斯皆深瞰龍宮高凌象度行者欷噓立者恐怖及兠率之懸喦乃回頭於一步細吹竹葉旋汲中泠將試蒙山之上品驗陸羽之茶經動清風於兩腋覺沈疴之頓輕潤通法雨功邁洗心撫轆轤則法輪常轉瞰深清則修綆宜尋斯第一之稱萬世之名比厨異香積堂開大徹弘濟功深饑饞道塞愧稷道之陵夷思博施而未得聿兹臺殿突兀巄嵷或嵌懸壁或倚危峰或倒臨龍窟或上摩高空如翬斯飛如苞之叢鱗鱗角角隱隱窿窿絪絪緼緼杳杳濛濛竹窗搖日松榻流風丹霞護於懸磬屓屭負其辰鐘篆香凝而晝暝舍利見而宵明叶蛟龍驚輪藏撤綵雲流旛幢揭貝葉動異香洩疑三島之瑤宮與大千之樂國因而眺長江觀巨浪望海門瞻疊嶂時乎清風息朗月上綠烟乍銷金波不漾澄萬頃之玻璃連長天於一象浮光湛然靜影晃晃恍若布金磚於祇園壓銀盤以青嶂吳帆楚纜蘭橈竹榜欵乃輕歌咿啞緩槳來若中留去疑不往或緩而似馳或迅而復党時乎風雨合蛟龍爭陰霾起濁浪層馮夷舞海若騰長年泣舟人憐張皇頃刻失錯顛連使人神馳魄悸毛髮悚然若東海紅羲輪駕六合白瓊花下悉順時而改觀皆可喜而可駭覩太平於有象開無聲之圖畫比夫暮鐘動晚潮升征騎獵獵戰鼓鉦鉦嗟有期而不爽悟人事之虛盈若或指戰塲於北固望王氣於金陵葱葱蒨蒨渺渺冥冥覩蛟蟠而螭據思虎鬪而龍爭幸金湯之如故懷保障之無能亦或仰長空飛鳥疾俯深淵遊鱗集臨磯呼老黿出斯至信之所孚非一朝而一夕殆有甚聽法之蛟點頭之石斯皆異態交從奇觀雜沓叶類有德之潤身而文章之外飾者也弔維往古靈異彌膴啟水陸之玄宗拔九幽之堕苦或胎幻以知期或書經而病脫雖恠誕而無徵又相傳而不惑斯又類神化之無方而非常情之所能度用是名賢聞士罔不假步回車或以為遊仙之傳舍或指為文客之寰區始能解坡翁之玉帶發張子之秀句斯有似夫德高而利見實修而盛譽者矣然是豈直燕遊之地釋子棲息之居而已耶辭曰天高地厚兮造化寔工陽闢陰闔兮變化無窮高高下下兮莫測其蹤或山立於淵兮泉瀑於峰知無物不有兮可興可風惟達人大觀兮近取吾躬秉節貴定兮處世慎從修德乃耀兮尚絅於中寧蒙求我兮匪我從童萬說不移兮虛受而通始終一致兮德乃尊崇貧富不渝兮夷險則同首陽奚貴兮千古高風我心匪石兮變化猶龍蒸雲布雨兮靜乃有功將叅三而中立兮焉事夫培塿之蟻封言有盡而意無窮乃返棹而擊節於江中泉石生涯賦羅坤泰撰南清凱師辭金山涉長淮登高虎圈吊古漢臺跨瀛洲之縹緲上瑤京以徘徊覲九重於伊邇招群英而往來于時羅浮子通籍金門操觚青鎖遭師與言憺忘物我凱師曰子亦知夫泉與石乎吾昔巢中流之孤嶼接大江之飛霞以巉岩為屋清泠為家漱地脉之春腴齊雲根之秋華知夫泉之為物始而涓涓終而潺湲激而為瀾瀦而為淵浩浩蕩蕩而播為巨川若乃蘭汀斂霧花島無烟飛鳥就樹賈客棲船一碧萬傾湛然與遙天相連於斯時也以智察之空明洞泓有似吾圓若夫石之為物平者如砥峻者如戟欹者為崖竅者為隙蒼蒼鬱鬱而削為峭壁爾其遙靄上陰膏雨下滌松蘿借青苔蘚附碧屹立萬仞截然與洪波相敵於斯際也以愚謀之妥帖恬默有似吾寂是故智圓足以周乎萬物而其機欲動愚寂足以滅乎萬慮而其神欲靜智愚相連動靜相應相應者心相連者性然而物生於氣氣祖於虛則吾與物咸歸於無物我既無而又何有心與性乎此吾所以得於泉石者如此而吾子果以為何如羅浮子曰無吾不能知也有則吾能言之與其智以察之曷若求諸心以發之與其愚以謀之曷若發諸心以求之故觀夫空明洞泓不若觀夫進後乎盈羨夫妥帖恬默不若羨夫固而且貞此堅者所以貴乎不磷而逝者所以嘆乎無停也况夫心吾身宰性我心生厥初至善厥體至靈非若泉石徒然其名今皆以為無有矣復何說之可稱也耶凱師曰雖然子言其要我言其妙我言其無子言其有有無要妙舉無足較烹泉煮石與子同調於乃援焦桐之琴撫清泉之操而歌曰清泉淼淼兮白石皛皛兮空吾耳兮非子莫知其妙兮羅浮子既竦耳而聽之乃賡為白石之歌曰白石皓皓兮清泉澔澔兮勿復道兮盍亦從而所好兮歌闋明月滿天清風在樹二人相顧一笑別去本山歷代相傳勅書宋咸平中有僧幼聰獻金山圖於真宗詔遣內侍藍繼宗賜大藏經一部明勅賜諸經一部景泰萬曆癸巳又賜藏經全部皇帝勅諭金山寺住持及僧眾人等朕惟佛氏之教具在經典用以化導善類覺悟群迷于護國佑民不為無助兹者聖母慈聖宣文明肅皇太后命工刊印續入藏四十一函并舊刻藏經六百三十七函通行頒布本寺爾等務須莊嚴持誦尊奉珍藏不許諸色人等故行褻玩致有遺失損壞特賜護持以埀永久欽哉故諭廣運萬曆二十一年二月之寶本山所賜田地舊額西津田地山塘灘共二百四十九頃一十七畝三分三釐九毫宋大中祥符間及元至大己酉年賜弘治間廵撫都御史彭蠡奏免坍江官田五頃一畝二分建康蘆塲七千畝宋元符末知樞密院曾布施以供薦慈塔下香燈之費歲輸夏稅麥四百八十五石九斗七升九合二勺荳二百八十八石三斗六合四勺絲一十四觔十三兩二錢一分九釐八毫綿一十三兩四錢一分一釐三毫秋糧米一千六十四石五斗二升四合馬草一千四百三十包三觔十二兩折納米一百四十三石三升七合五勺每十年輪充均徭三名弘治間僧安賢奏免以為事例寺舊有軍三名站馬二疋僧充糧里長役歲運所輸糧至通州交納寺僧苦之宣德三年住持僧道瀾具奏奉宣宗皇帝聖旨當軍的開了他軍伍當匠的還當匠事故了免他勾補站馬免他走官糧准他本處交納糧里長不要和尚當欽此今刻石寺中已上舊額田產俱以漸消耗今只存在冊田五十七頃書京口三山存恤碑後明尚書陸光祖金焦北固三山鼎峙大江鞏固天闕金陵實寰宇間之鉅勝其梵剎自江左六代僧得道者如林先朝賜香燈供養田甚夥近歲腴田盡沒於民家所存磽薄纔什百之一而賦益重費益繁僧益困極則千餘年古剎日頺廢矣余每過之興嗟語當事者漫無訾省至萬曆癸未春撫臺中丞郭公按院侍御邢公下其議于兵憲按察李公於是太守王君司理左君與徒陽二邑之長僉議存恤减賦蠲役具如兵憲檄文所云余同郡太史馮君為書其事鐫于石以草示余余時病卧當湖上竊獨嘆一時內外臺郡邑長佐皆仁賢循吏故能為此利澤之事於無窮因書以識喜立圖傳示永久焉書京口三山存恤碑後明編修馮夢禎余聞兵憲李侯存恤京口三山事而甚為法道興慨也魚相與處于陸相呴以濕相濡以沫孰若相忘于江湖哉三山鼎峙大江為東南勝剎當法道盛時多擇明眼尊宿為之住持十方龍象望風雲集僧徒萬指至割膏膄數千頃充其供養縉紳大夫東西遊者非徒登眺山川且以咨决心要如東坡佛印之事不一而足炳耀今古抑何巍巍也方今法道向衰僧徒凋弱賜田存者僅千百之十一又多瘠薄佃租畝僅一斗糧差戶役不異齊民天下故少明眼人職住持者與常僧無異官府追呼若待奴隸縉紳大夫僅以遊覽行不復知佛法為何事而送迎供給之費反以累僧奈之何其不窮且逃耶李侯以憲臣視兵鎮江郡慨然念之下有司議存恤於是三山田若干頃除額稅外條編料價如數蠲免且給券為永守計嗟乎仁哉魚將枯死而不呴之濕濡之沫即頃刻之不延而安所俟江湖以是知李侯之恩與三山並存也李侯去矣繼李侯者庶幾其常存李侯之心而徼福三山也哉附存恤下帖欽差整𩛙蘇松常鎮兵備兼管河道驛傳湖廣提刑按察司副使李為違旨飛累事萬曆十八年二月初八日奉欽差總理糧儲提督軍務兼廵撫應天等府地方都察院右副都御史周批該本道呈詳本院批仰蘇松兵備道通將金焦甘露應納應免錢糧查議詳報奉經行據鎮江府查議前來該本道看得金焦甘露三山並係先朝勅建故各有欽賜田地在金山則有五十七頃焦山五十六頃甘露四十九頃每畝止納勸米二升其餘夏秋稅糧條編料價等項盡數蠲免此特恩也後因一則均糧一應糧差悉與民田同科由是金焦等三山寺僧呈告不已至萬曆十八年間該前道酌議除夏秋稅糧照舊辦納外止將條編料價量行優免焦山約免十分之五金山約免十分之七甘露盡免葢因地當南北之衝經過使客時而登臨僧人薪水之費誠所不貲故以此少示優恤耳况經前院詳允似應仍舊批開前因擬合就行為此除行該府轉行先年欽賜田地照數優免所據金焦甘露三山田地仍照前道原議優免合給劄付焦山金山甘露寺住持將本寺先年原蒙欽賜田地每年夏秋稅糧照依民間田地一體辦納其料價條編盡數優免餘田不得影射冐濫須至劄付者萬曆十八年二月十三日給
