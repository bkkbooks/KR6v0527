body:
  text: 金壇綏菴居士蔣超較正嗣祖比丘鐵舟行海修輯楚潭叅學門人超智編次形勝山在郡城西北七里大江中長山西北起為五州至下鼻浦遂入大江突起而為金山又名浮玉又名獲符又名伏牛皆相形之比擬而已金山之名其來久矣自梁天監中律師僧祐高僧寳誌已在金山建水陸會極其祥瑞名澤心寺至唐天寳中有廣陵靈坦禪師初於江心金山之北入定蟒洞降蟒歸海乃重開山為禪宗之始焉貞元間裴頭陀建伽藍水際獲金數鎰以聞賜名李錡奏而易名皆前人之悞也金山之說本出華嚴此閻浮提外香水海中有七金山遶須彌盧因海水瀠洄播溢無定以金山鎮之此山相似而得其名梵語須彌此云妙高故亦名妙高峰又烏得而疑之乎葢天下之名山皆本同而末異孰謂兹山無本自其遠而言之雪山發脉崑崙抽幹五嶽定鼎南抵金陵之紫金山自其近而言之以紫金旋北而起五州自五州入江以此山奇秀威峙中流萬派朝宗古德名賢互相推盛無得而比之雖所擬之名不同亦其勝之一端也本末同異詳錄於左以昭天下形勝云金山註已見前序浮玉山道書云自玉京諸峯若浮而至周必大謂風濤四起勢欲飛動故名獲符山晋破符堅置俘山下故名伏牛山此相形比擬又唐志貢伏牛山銅器為據龍游山宋真宗常夢游其山後賜額故名石簰山在西北急流中有漩渦常防溺舟之患米芾賦云浮玉捲霧石簰落潮又號頭簰宜慎之妙高峰即須彌也獨出眾山曰高四寳所成曰妙南方有國名曰勝樂峰名妙高比丘德雲常居於此善財童子叅之金鰲峰宋端明學士蘇紳有詩云僧依玉鑑光中住人踏金鰲背上行之句日照巖在山之東即朝陽洞是也巉崖絕磴深丈餘許萬曆間有僧重開草莽號曰老朝陽焉妙空巖在朝陽之右谽谺洞豁縱廣數丈可通山底裴公洞在峰之側幽峻奇絕入深四五丈許宋相張商英題云白蟒化龍歸海去岩中畱下老頭陀事與龍洞同郭璞墓在金山之西日本使臣中心叟題曰水底有天行日月墓前無地拜兒孫之句善財石在山之東南水中亦名鶻嶺宛然瞻禮之狀道遐題妙高臺畔有時見疑是善財叅德雲磐陀石在洞前蘇子瞻與佛印禪師常談於此題云中泠東畔石磐陀古來出沒隨濤波臥龍石此石在石𥱼山前隱於水底舟觸自壞特立險竿以警過往者龍洞在朝陽之左深不可測俗呼珠洞唐時常有毒龍吐氣近者多病因靈坦禪師降之即去龍井即中泠泉其泉在郭璞墓前因有三禁之說又當漩波險峻難汲以井易之其水亦佳覺岸在砥柱東泊舟處明許少華題云幾時登覺岸為我發塵蒙小華山人重勒石信磯在聽潮軒前昔人呼黿處以浮玉山隨波出沒潮汐不爽竹逕山頭有竹二本云黃金嵌碧玉碧玉嵌黃金在大悲殿後靈觀閣前謂之竹逕龍門在筆架山之右相傳龍宮在下紀出三禁堂鶻嶺即善財石也建置形勝者天生也建置者人力也無天生何以見峰巒之奇秀江海之寬廣無人力何以見殿宇之精麗樓閣之參差雖有天生之勝其人力豈可以少乎哉然人力在緣勝緣勝則百廢俱興緣不勝相時補綴而已是故緣勝則建置勝具載無遺備年氏於現在實錄也詳廢興於既往返始也或昔有而今無必錄以存其功也三者立將來勸建置之道益無窮矣故畢列於左以昭天生人力之佳境焉澤心寺東晉時名趙孟頫謂元帝時虞集謂明帝時未詳孰是龍游寺以其狀若游龍出水宋咸平中寺僧幼聰獻金山圖詔遣內侍藍繼宗賜大藏經祥符五年詔改龍游寺天禧初真宗夢游以飛帛書龍游禪寺四字賜之寺僧表求舊額改曰金山龍游禪寺大雄寳殿按天下叢林正殿咸稱大雄大者包含萬有雄者攝伏群魔寳者乃三寳也皆歸此殿傳持正法我佛威力雄鎮大千也此殿曾遭宋元兵火已廢明正綂間是殿復成之者有徽郡祁門汪克明公也公客京口嘗登是山見殿宇傾頺非尊佛道遂傾囊鳩工重建此公艱於子嗣因修建叢林普濟急難樂善勇為子孫殷富代不乏科乃公之緣所致後之見此凡覩叢林零替必有加於汪氏者天王殿在大雄殿之前天順壬午都綱弘霔重建正德庚辰御用太監馬俊重修至順治戊戌年復傾弛住山比丘行海率同耆宿浩然滄濤二公及信士湯承宇汪正甫吳五州等重建本殿兩間永禁不可竪碑有傷風水闔寺咸知祖師殿在大殿右即成化年住持安溥重建至清朝因其墜落住山比丘行海重建葢天下名山祖堂皆遵白雲端祖儀式惟設像三尊一達磨祖師西來正脉二百丈禪師叢林師表三開山大師不忘始創今此山設像五尊何故因其舊有不便改移遂令安名佛印元禪師圜悟勤禪師實住此山有大功而名最著者其餘列祖均是牌位此係行海公同闔山耆宿在郡諸護法所設永垂不朽云時順治戊戌年十二月朔日立伽藍殿在大殿左舊名水府殿正綂丁卯都綱弘霔重建正德辛未住僧重建大悲殿在半山之中永樂年太監鄭和浮海至大洋空中現千手觀音得無風波之險於是命工塑所見像造殿于兹祀之正德戊寅尚膳太監李和奉使浮梁至清河夜夢此殿頺重建彌勒殿在大徹堂後是也大徹堂即古曉堂也宋建炎臨濟正宗佛果勤禪師結制山中一夜悟十八位高賢如佛智佛海徹菴或菴瞎堂瞎石等遂更名大徹堂高宗南渡即位二年正月詔金山住持克勤入對行在稱旨大悅賜號圜悟又奉旨住維揚雍熙寺上問居金山如何勤曰金山在大江中臣僧老且病願歸林野以保餘年復勅住江西雲居寺時大慧杲亦過金山省覲後數百年雖有主席不及復整戊子春行海同先師箬菴問和尚重開此席內外萬指可謂一時之勝至順治庚子此堂傾墜於壬寅勉力有蔣太史諱超胡鹽臺諱文學杜道臺諱漺及信商黃僎等重建大徹禪堂五間上下樓閣樓上為古曉堂作法堂樓下仍為叅禪堂是不忘其所自也三禁堂宋別峰印禪師主金山入定神遊水府龍有所告出建此堂三禁者以其不載鐘樓鳴大鐘不推轉輪藏不渡石𥱼汲中泠水皆神龍所忌始知山下有龍宮焉永安堂在大雄之南宣德年住持道瀾建正綂年主僧弘滋重建中書舍人金湜扁今廢宣德初金山以賦重役繁僧皆散去有司以是事聞於廵撫廵撫召諭之曰僧民一理也今或不得其生而去者必有故汝其圖之於是群寮相議以為廢興之機存乎其人誠得勤能之僧以主之則其廢斯興矣乃聘瀾師來主寺事師奉命唯謹既入寺即以事佛為己任舉廢為急務晨夕拳拳如有所失忽遇宦臣尚公義携師至闕下懇陳寺之重役頺苦又得地官尚書兼署兵部夏忠靖公具本復奏蒙賜優免師遂謝恩歸寺滌心焚修賞其勤戒其墯僧佃有再犯不悛者悉擯斥之於是上下勸懲捷如影響兹山之勝煥然改觀特搆永安堂以昭後進按師字文海蘇之常熟人號拙菴住浙之阿育王奉旨遷金陵之天界係別峰印禪師法嗣後由承天復遷金山住持丙辰正月廿二日沐浴更衣趺坐而化壽六十有九臘四十八後有剃度弟子三人弘霔弘演弘滋陞任都綱滋傳永奫奫傳安吉吉之傳子孫不絕崇祀法蔭代不乏僧綱其文海之功有光于後故名永安余以師考之乃佛法中人緣弟子輩以世法為繼未免不能體師之志也良可太息泳思堂此山有上司官長迎送設席在大佛殿褻慢佛天此心不忍於順治年間蒙鞠四尊諱鼎𢖍率都綱深奧建此堂作公館則佛殿得以清淨功德福澤無窮命題為泳思也淨居堂在永安後癸巳歲長沙曠宗舜為濟公藏修題扁淨居乃梵天宮名以其超六慾絕聲色也今廢玉鑑堂王安國為佛印禪師題或名玉帶堂今廢浮金堂在寺之中宋徐元用嘗邀子瞻同遊賦詩處今廢悟心堂在妙高臺下景泰間寧諼重建今廢至遊堂元祐年寶覺禪師建蘇學士為記今廢雄跨堂乾道初淮東路總管洪适題額今廢觀瀾堂在祖師殿後成化間僧安賢建今改為三官殿海月堂在中泠亭後今廢黃鶴樓原係郭璞祠基順治丙戌丹徒令唐虞世建海嶽樓在永安之右正德唐都綱惠鑾建郡守滕謚題藏樓在天王殿左崇禎癸巳住僧成理建待月樓在永安之左嘉靖年主僧圓濟建今廢水陸樓在大徹禪堂左明住僧晉雲建便供水陸道塲善財樓在妙高峰右宋僧𢖍適中建今廢𣷉虛樓在聽潮軒左正綂間都綱弘霔建郡守姚堂題扁枕江樓在天王殿左今廢聽江樓散玉樓懷劬題今廢拱都樓洪有聲題今廢寳光樓僧定越建後孫都綱深奧遷一分住朝陽門郭家坡長生菴潄玉樓今廢毘盧閣在大雄之後成化年住山安漙重建即金鰲閣昔蘇端明書額藏經閣即昔日殿也在毘盧閣後正綂十二年侍郎周忱奏請一藏安置本寺建殿奉事計經一十匱合六百四十凾天字至庭字止經從植字凾竟已後唐宋元明各代高僧禪師聖皇名臣編集拾遺紀錄雖入藏矣不在此數江天閣在山頂之南弘治丙辰主僧安賢建即靈觀閣自監建水陸大會祀五顯神于茲山左少叅王徽撰碑畱玉閣周廷鑨題慈雲閣化城閣未詳建氏僧仲珠有南徐十詞此閣居七王安石登過今廢無邊閣未詳建氏今大徹堂後有臺是閣基俗云布袋亭奎文閣宋高宗幸建康孝宗以元子扈從登金山命郡守方滋建今廢萬壽閣即萬佛閣至治辛酉勅僧應深出內府寳鈔裝萬佛像至順二年上命學士虞撰記今廢西來閣環虛閣司祿閣李延大題關聖閣明辛卯僧定澄建三聖閣今廢真武閣今廢回瀾亭在大藏經殿右俱鄭公重建有記觀瀾亭在中泠泉北臨江處宋寳祐間主僧永茂建久廢吞海亭在絕頂之北宣德年住持德全重建畱雲亭在絕頂之南景泰年都綱弘霔重建妙高臺楞伽臺湧翠軒在回廊右住僧寧諼建吏部尚書三原王恕題扁聽潮軒在江天閣下都綱弘霔建住持安漙修太常卿程南雲書扁養素軒在覺岸左住僧智明建旴江左替扁𣷉清軒在妙空岩右住僧理潮建鎮濤軒在寂逕右雪月軒在寂逕左笑傲軒今廢龍王廟在山之西南正統年侍郎周忱重建按五代初楊氏據江南封神為下元水府昭信㤗江王祥符初封曰顯濟元豐中佛印以禱者病涉又附禪林割牲以享非其禮因請遷于江之南岸建炎中燬浙西安撫劉光世重建紹興丁卯都綂制王勝重修嘉㤗中加封英靈普護聖惠㤗江王嘉定中郡守史彌堅重建自撰記畧曰歲夏六月不雨至于孟秋之望農以病告禱於祠膚寸之雲起自祠旁次日炎曦亭午焦山外濃雲潑墨冷風掠人面如氷雪兩龍現於其間水波逆泫有聲上與龍接疾電震雷甘雨隨至歲仍大豐明朝洪武初詔封順濟龍王每歲十月望旦郡邑特牲致祭天順八年郡守姚堂重修工部主事鄭霛記畧曰天順壬午夏秋不雨遂躬詣祠下三禱三注歲獲有秋癸未甲申天復亢旱禱之隨雨歲仍大豐四民懽頌曰此無他牧民得人故雨暘時若也薦慈墖元符末丞相曾布建雙墖於山頂南北相向請名于朝捨蘆塲七頃在建康又王安石捨田八頃並為墖下香燈之資今俱迷失方丈在山之中唯住持得居之以其容納無𥝠巨細畢舉之謂否則道眼日昏衰相日見庫司在香積之右香積厨在湧翠軒後一漚菴今廢信菴今廢淨業菴馮夢禎題北菴弘治僧惠明建今廢玉帶橋在山之北永安橋在山之南三忠祠內奉嗣韓世忠文天祥魏勝國公皆宋忠臣也係龍王廟左首春秋有祭祖堂法系淵源叙葢天下名山因法席而顯法席以住持為尊住持必以祖堂為燈續其奉祀規模起自白雲端祖之儀式也則住持淵源不至淆亂而有序矣金山江南名剎歷代祖庭山夙有名祖堂不稱順治戊子春叅隨先老人重興此席每以此語余與梅生杲法兄二人曰當秉我意旨而行毋負名山重興之願梅兄有秀水漏澤之請余亦有江寧天隆之命皆不及此後蒙潤之諸君子山之眾耆宿請繼斯席遂不敢違遺命朝夕兢兢勉力告成然祖堂雖就奉祀列祖之位難容混越必求兹山開堂激揚宗乘師承的據法系洞然者庶幾為一代之光明幢也其泛濫之流曷能預數哉余所以愽採五燈諸錄叅考高僧志傳鑒訂清徹而續入之一則開諸祖儼然生面二則滿先老人之遺命自唐至國朝三十有四燈係臨濟曹洞雲門三宗其法嗣來源綂出於禪燈世譜稍有疑似不敢輕入仍有法嗣無機緣語錄者俟再稽考補之可也俾後之住持此山者一覩淵源之意則昭然而有次序矣臨濟三十二代孫行海頓首拜撰祖堂歷代淵源法次位梁東土初祖達磨大師唐南嶽下三世百丈懷海禪師唐大鑑下三世開山廣陵靈坦禪師宋南嶽下十世瑞新禪師宋南嶽下十一世達觀頴禪師宋南嶽下十一世佛印元禪師宋南嶽下十二世懷賢圓通禪師宋南嶽下十二世寳覺禪師宋南嶽下十三世善寧印禪師宋南嶽下十三世法慧禪師宋南嶽下十四世慧滿禪師宋南嶽下十四世佛日禪師宋南嶽下十四世惟仲禪師宋青原下十三世枯木成禪師宋青原下十四世金山堅禪師宋南嶽下十五世曉常禪師宋南嶽下十五世金山一禪師宋南嶽下十五世圜悟勤禪師宋南嶽下十五世了心禪師宋南嶽下十七世別峰印禪師宋南嶽下十七世達觀禪師宋南嶽下十八世永聰禪師宋南嶽下十八世道奇禪師宋南嶽下二十世掩室開禪師宋南嶽下二十世普度禪師元南嶽下二十世訥堂禪師元南嶽下二十一世慧朗禪師元南嶽下二十一世心海禪師元南嶽下二十一世惠明禪師元南嶽下二十二世了即休禪師元南嶽下二十二世長溪深禪師元南嶽下二十三世別峰在禪師元南嶽下二十三世南清凱禪師明南嶽下二十四世文海瀾禪師明南嶽下二十四世慈舟濟禪師明南嶽下二十四世天泉淵禪師明南嶽下三十五世箬菴問禪師明南嶽下三十六世頂目徹禪師明南嶽下三十六世問石乘禪師清南嶽下三十六世鐵舟海禪師清南嶽下三十六世天笠珍禪師清南嶽下三十七世香林淨禪師清南嶽下三十七世法乳樂禪師清南嶽下三十七世可達𤇍禪師清南嶽下三十八世量聞銓禪師東土初祖達磨大師師於梁普通七年庚子歲九月二十一日廣州史蕭昂具主禮迎接表聞武帝帝覽奏遣使賫詔迎請十月一日至金陵帝問曰朕即位以來造寺度僧不可勝紀有何功德祖曰實無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真實功德祖曰淨智妙圓體自空寂如是功德不以世求帝又問如何是聖諦第一義祖曰廓然無聖帝曰對朕者誰祖曰不識帝不領悟祖知機不契是月十九日潛回江北十一月二十三日届於洛陽當魏孝明帝正光元年寓止於嵩山少林寺面壁而坐後顧慧可而告之曰昔如來以正法眼付迦葉大士展轉囑累而至於我我今付汝汝當護持并授汝袈娑以為法信各有所表宜可知矣可曰請師指陳祖曰內傳法印以契證心外付袈娑以定宗旨後代澆薄疑慮競生云吾西天之人接汝此方之子凴何得法以何證之汝今受此衣法却後難生但出此衣并吾法偈用以表明其化無礙至吾滅後二百年衣止不傳法周沙界明道者多行道者少說理者多通理者少潛符密證千萬有餘汝當闡揚勿輕未悟一念回機便同本得聽吾偈曰吾本來此土傳法救迷情一花開五葉結果自然成祖又曰吾自到此凡五度中毒我嘗自出而試之擲石石裂緣吾本離南印來此東土見赤縣神州有大乘氣象遂踰海越漠為法求人際會未諧如愚若訥今得汝傳授吾意已終唐南嶽下三世百丈懷海禪師師以禪宗肇自少室至曹溪以來多居律寺雖列別院然以佛法住持未合規度切常爾介懷乃曰佛祖之道欲誕布元化冀來際不冺者豈易與諸部阿笈摩教為隨行耶或曰瑜伽論纓珞經是大乘戒律胡不依取師曰吾所宗非局大小乘非異大小乘當博約折中輔律而行調護攝持在事皆理葢佛之道以達磨而明佛之事以百丈而備凡為天下後世建立叢林開遮禁勸細大合宜未有不取法於斯者其諸軌度具載清規唐大鑑下第三世開山廣陵靈坦禪師荷澤神會禪師法嗣師姓武太原文水人乃則天太后姪孫也師叩神會會施善誘頓見其心默而許之容其執侍始末研磨得破疑滯神會於天寳初召坦曰我有一句祖祖相傳至曹溪付我汝諦受之後住潤州江中金山其山北面有一龍穴常吐毒氣如雲有近者多病或斃師常居之毒雲滅迹出高僧傳宋瑞新禪師師係福昌善禪師法嗣南嶽下第十世傳雲門宗也僧問吾有大患為吾有身父母未生未審此身在甚麽處師曰曠大刦來無處所若論生滅盡成非曰恁麽則周徧十方心不在一切處師曰泥裏撼椿上堂云世間所貴者和氏之璧隋侯之珠金山喚作驢屎馬糞出世間所貴者真如解脫菩提涅槃金山喚作𡱰沸碗鳴且道恁麽說話落在甚麽處故不是取舍心重信邪倒見諸人要知麽猛虎不顧几上肉洪爐豈煉囊中錐宋達觀頴禪師得法於谷隱聰禪師南嶽下第十一世傳臨濟宗也師首謁太陽玄禪師遂問洞山特設偏正君臣意明何事陽曰父母未生時事師曰如何體會陽曰夜半正明天曉不露師罔然遂謁谷隱舉前話隱曰太陽不道不是秪是口門窄滿口說未盡老僧即不然師問如何是父母未生時事隱曰糞塹子師曰如何是夜半正明天曉不露隱曰牡丹花下睡猫兒師愈疑駭一日普請隱問今日運薪邪師曰然隱曰雲門問僧人搬柴柴搬人如何會師無對隱曰此事如人學字書點畫可効者工否則拙葢未能忘法耳當筆忘手手忘心乃可也師於是默契良久曰如石頭云執事原是迷契理亦非悟隱曰汝以為藥語為病語師曰是藥語隱呵曰汝以病為藥又安可哉師曰事如凾得葢理如箭鋒拄寧有加者而猶以為病實未喻旨隱曰妙至是亦秪名理事祖師意旨知識所不能到矧事理能盡乎故世尊云理障礙正知見事障續諸生死師恍如夢覺曰如何受用隱曰語不離窠臼安能出葢纏師歎曰纔涉唇吻便落意思盡是死門終非活路上堂大眾集定有僧纔出禮拜師曰欲識佛性義當觀時節因緣僧便問如何是時節因緣師便下座僧問師唱誰家曲宗風嗣阿誰師曰臨濟曰恁麽則谷隱的子也僧曰德山問如何是長法身師曰拄杖長六尺曰如何是短法身師曰算子三寸曰恁麽則法身有二師曰更有方圓在師過京師寓止駙馬都尉李端愿之園日夕問道一時公卿多就見聞其議論隨機開悟李公問曰地獄畢竟是有是無答曰諸佛向無中說有眼見空花太尉向有中覓無手摣水月堪笑眼前見牢獄不避心外見天堂欲生殊不知忻怖在心善惡成境太尉但了自心自然無惑曰心如何了答曰善惡都莫思量又問不思量後心歸何所頴曰且請太尉歸宅頴東遊初住舒州香爐峰移住潤州因聖太平之隱靜明之雪竇又遷金山龍游寺嘉祐四年除夕遣侍者持書別揚州刁景純學士曰明旦當行不暇相見厚自愛景純開書乃驚曰當奈何復書决別而已中夜候吏報揚州馳書船將及岸頴欣然遣撾鼓陞座叙出世本末謝裨贊藂林者勤修勿怠曰吾化當以賢監寺次補下座讀景純書畢大眾擁步上方丈頴跏趺揮令各遠立良久乃化嘉祐間正月元日達觀曇頴禪師遷化生錢唐丘氏年十三依龍興寺為大僧神情秀特于書無所不觀為詞章多出塵語十八九遊京師時歐陽文忠公在塲屋識之游相樂也細閱師之廣錄乃五年元日可謂奪胎神化乃秉夙願耳宋佛印了元禪師字覺老生饒州浮梁林氏世業儒父祖皆不仕元生二歲琅琅誦論語諸家詩五歲誦三千首既長從師授五經畧通大義因讀首楞嚴經于竹林寺愛之盡捐舊學白父母求出家度生死禮寶積寺沙門日用試法華受具游廬山謁開先暹禪師南嶽下十一世傳雲門宗也暹自負其號海上橫行俯視後進元與問答捷給乃稱賞時年十九又謁圓通訥公訥曰骨格已似雪竇後來之俊也時書記懷璉方應詔以元繼其職江州承天虛席又以元當選郡將而少之訥曰元齒少而德壯雖萬耆衲不可折也于是為開先之嗣時二十八矣自承天遷淮之斗方廬山之開先歸宗潤之金山焦山江西之大仰又住雲居凡四十年間德化緇素縉紳之賢者多與之游東坡謫黃州廬山對岸元居歸宗酬酢妙句與烟雲爭麗及其在金山東坡釋還東吳次丹陽以書抵元曰不必出山當學趙州上等接人元得書逕來坡迎笑問之元以偈答曰趙州當日少謙光不出山門見趙王爭似金山無量相大千都是一禪牀坡抵掌稱善又嘗謂眾曰昔雲門說法如雲雨絕不喜人記錄其語見必罵逐曰汝口不用返記吾語異時裨販我去今室中對機錄皆香林明教以紙為衣隨所聞即書之後世學者漁獵文字語言正如吹網欲滿非愚即狂時江浙叢林尚以文字為禪之謂請益故元以此諷之高麗僧統義天航海至明州傳云棄王位出家上疏乞遍歷叢林問法受道有詔朝奉郎楊傑次公舘伴所經吳中諸剎皆餞如王臣禮至金山元牀坐納其大展次公驚問故元曰義天亦異國僧耳僧至叢林䂓繩如是不可易也眾姓出家同名釋子自非買崔盧門閥相高安問貴種次公曰卑之少徇時宜求異諸方亦豈覺老心哉元曰不然屈道隨俗諸方先失一隻眼何以示華夏師法乎朝廷聞之以元為知大體李公伯時為元寫照元曰必為我作笑狀自為贊曰李公天上石麒麟傳得雲居道者真不為拈花明大事等閒開口笑何人泥牛漫向風前齅枯木無端雪裏春對現堂堂俱不識太平時代自由身元符元年正月初四日聽客語有會其心者軒渠一笑而化其令畫笑狀而贊之非苟然也宋懷賢圓通禪師得法於達觀頴禪師南嶽下十二世傳臨濟宗也僧問師揚宗旨得法何人師拈起拂子僧曰鐵甕城中曾印證碧溪崖畔祖燈輝師拂一拂曰聽事不真喚鐘作甕宋寳覺禪師乃育王璉禪師法嗣南嶽下十二世傳雲門宗宋善寧印禪師係慧林本禪師法嗣南嶽下十三世傳雲門宗僧問天皇也恁麽道龍潭也恁麽道未審和尚作麽生道師曰手握白玉鞭驪珠盡擊碎曰退身有分師曰知過必改上堂顧大眾曰古人道在眼曰見在耳曰聞在鼻曰嗅香在舌談論在身覺觸在意攀緣雖然如是秪見錐頭利不見鑿頭方若是金山則不然有眼覰不見有耳聽不聞有鼻不嗅香有舌不談論有身不覺觸有意絕攀緣一念相應六根解脫敢問諸禪德且道與前來是同是別莫有具眼底衲僧出來通個消息若無復為諸人重重註破放開則私通車馬捏聚則毫未不存若是飽戰作家一任是非貶剝僧問如何是佛師云眉如初月眼似流星云如何是法師云義列交羅星分大野云如何是僧師云古貌稜層丈夫意氣宋法慧禪師乃慧林本禪師法嗣南嶽下十三世傳雲門宗僧問大修行人還落因果也無師曰鳩鳥入水人皆死毒龍行處草不生宋慧滿禪師乃常熟珍禪師法嗣南嶽下十四世傳臨濟宗宋佛日禪師乃善寧印禪師法嗣南嶽下十四世傳雲門宗宋惟仲禪師乃佛國白禪師法嗣南嶽下十四世傳雲門宗皇后遣中使降香為皇帝祝延聖壽上堂法本無說隨事應機心本絕形遇緣即現古今如是凡聖同途葢眾生迷妄不知遂成流轉故能仁頓忘情見了達根源不從外求亦非內得所以佛佛授手祖祖相傳道貫一乘宗分五派臨濟則賓主互換韶陽乃顧鑑全超溈仰則父子相投曹洞乃君臣慶會清涼法眼直指惟心建立門風各張舖席包含萬象該括大千冥冥不混於色聲蕩蕩豈妨於語嘿把定則十方坐斷虎踞龍蟠放行則千聖出興風行草偃助堯仁政化祝睿算延鴻降伏眾魔普利群有然雖恁麽猶涉程途且道正令當行如何理論良久云一氣不言含有象萬靈何處謝無𥝠宋枯木成禪師乃芙蓉楷禪師法嗣青原下十三世傳曹洞宗師初住東京淨因次住金焦二山上堂燈籠忽爾笑咍咍如何露柱亦懷胎天明生得白頭女至今遊蕩不歸來這寃家好歸來黃花與翠竹早晚為誰栽上堂知有佛祖向上事方有說話分諸禪德且道那個是佛祖向上事有個人家兒子六根不具七識不全是大闡提無佛種性逢佛殺佛逢祖殺祖天堂收不得地獄攝無門大眾還識此人麽良久曰對面不仙陀睡多饒寐語上堂歸元性無二方便有多門但了歸元性何愁方便門諸人要會歸元性麽露柱將來作木杓旁人不肻任從伊要會方便門麽木杓將來作露柱撑天柱地也相宜且道不落方便門一句作麽生道三十年後莫教錯舉頌達磨大師示門人得皮得髓公案云四維上下絕遮欄湧出水壺印碧天無孔笛中藏六律一聲驚起釣魚船出寳訓宋金山堅禪師乃淨因法成禪師法嗣青原下十四世傳曹洞宗宋曉常禪師乃智海平禪師法嗣南嶽下十五世傳臨濟宗宋金山一禪師乃泐潭清禪師法嗣南嶽下十五世傳臨濟宗宋圜悟勤禪師乃五祖演禪師法嗣南嶽下十五世傳臨濟正宗住金山師在高郵乾明受勅陞座大道無背面真機有卷舒撮大地如陶家輪運大千向針鋒上猶未是寰中正令閫外全威所以萬國仰瞻同歸舜日靈光一道共照皇家重興佛祖道塲追還普天寳所正令全提主賓同用山僧今日得奉一人聖詔傍資宰輔威權共建法幢竪立宗旨楊子江心滔天輥浪妙峰孤頂舒卷閒雲是處著眼不前頂𩕳正令全現若是個同得同用同殺同活底共一眼見共一耳聞同一口宣同一音演更無異緣亦無異見說什麽九十六種二十五有正要當頭辨取一時列在下風且如今日應時應節事作麽生道一句逈超今古格萬年仰祝聖明天上堂僧問遠辭帝闕已届南徐不涉程途請師埀示師云到此已六日進云竹密不妨流水過山高豈礙白雲飛師云猶涉唇吻在進云不涉唇吻請師道師云高高處有餘進云衲僧家入林不動草入水不動波且以何為證師云猶較些子進云只許老胡知不許老胡會師云且莫詐明頭師乃云三十年前曾到此如今樓閣碧參差善財叅處真消息誰識德雲間古錐還有識得底麽未渡瓜洲時有一句子已與諸人道了也若以心思若以意識若以眼見若以耳聞則沒交涉直得七佛已前威音𨚗畔薦得猶是話會在若委悉得更不用如之若何便請丹霄獨步苟或未然不免落第二義門去也江心一峯樓臺相映水面雙塔金碧交輝誠聖帝福田乃禪林上𠛴為琳宮為佛宇為淨土為穢邦建立法幢弘荷祖道若非今上皇帝睿聖文明深信此道安能首降詔書復此寶坊以為福地如今所以與諸人向此古道場中各得相見既到者裏直須念德修德知恩報恩若也如此則佛法付囑有在正當恁麽時一句作麽生道銀山鐵壁無回互草偃風行得自由開堂判府延康度疏與師師接了云斷盡現成公案擲地金聲發明古剎家風耀天光彩出自大手筆顯示最上乘正欲四海普聞便請僧正宣過指法座云須彌燈王如來見居此座放大光明說法了也還聞麽苟或未聞既爾當爐不避火更須撥轉上頭關遂陞座拈香云此一瓣香奉為今上皇帝祝嚴聖壽恭願文明齊二曜睿等等乾坤奪少康得禹迹之功成宣光與漢室之業萬邦歸聖化八表偃干戈此一瓣香奉為判府安撫延康通判學士闔郡文武官僚伏願位隆盤石功濟維城居方面則魯衞晉齊陟巖廊則臯蘷稷此一瓣香佛眼也覷不見江淮十載受盡辛勤一旦白雲打破漆桶六處忝領大𠛴七回拈出此香奉為蘄州五祖山真慧禪院第十二代演禪師以酬法乳遂斂衣陞座焦山和尚白槌云法筵龍象眾當觀第一義師乃云適來未陞此座第一義已自現成如今槌下分疎知他是第幾義也還有打成一片解觀得底麽試出未對眾舉看僧問目視雲漢德雲不下玅高峯至化難逃金山且通一線路報恩一句請和尚道師云萬年長祝聖明君進云可謂帝力丘山重君恩宇宙寬師云愈令心似鐵進云金枝永茂千年秀玉葉長芳萬古春師云又得闍黎其證明進云昔日裴相公入寺石霜借笏垂慈今日台斾親臨未審如何相見師云只了個見成公案進云瑞氣直從天上降祥雲元自日邊來師云高著眼進云只如和尚六處開堂為人說法還有人相肯也無師云一時不肯進云為什麽不肯師云獨許師乃云大道絕中邊至真離言說諸佛莫能提祖師莫能傳透聲透色絕遮欄蓋地蓋天無向背豈止棒頭取證喝下承當直饒千眼頓開未免依草附木到者裏要須是針劄不入風吹不倒把斷要津不通凡聖底始得是故靈山會上廣額屠兒放下屠刀云我是千佛一數大集會中大刀魔王云待一切眾生盡皆成佛了然後發菩提心豈不是龍象蹴踏師子嚬呻敵勝驚群藴大丈夫意氣始可承當擔荷所以道殺人不眨眼底立地成佛立地成佛底殺人不眨眼還他過量人提持過量智發明過量機展演過量用正當恁麽時向過量境界中作麽生道還知麽仰祝聖君無量壽河清海晏樂昇平宋了心禪師乃雪峰慧禪師法嗣南嶽下十四世傳臨濟宗上堂佛之一字孰云無木馬泥牛滿道途倚遍欄干春色晚海風吹斷碧珊瑚還有同聲相應同氣相求者麽百鳥不來樓閣閉祇聞夜雨滴芭蕉宋退菴道竒禪師乃徑山別峯印禪師法嗣南嶽下十八世傳臨濟宗僧問雪峯曰望州亭與汝相見了也意旨如何師曰左眼半斤曰烏石嶺與汝相見了也作麽生師曰右眼八兩曰僧堂前與汝相見了也又且如何師曰鼻孔大頭向下曰只如鵝湖驟步入方丈保福入僧堂此意又作麽生師曰水向石