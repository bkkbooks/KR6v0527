進云如何是境中人師云龍出曉堂雲進云人境相去幾何師驀呈拄杖進云人境不立又作麽生師云也知你在此躲跟進云恁麽則妙高臺上千秋月中泠一滴萬年清師云點點不在別處乃舉白雲端祖舉雪竇道偶續靈峰炤夜燈遽泛鐵船下滄海承天此者也隨例泛一隻鐵船文殊普賢為招頭把柁觀音摩詰為打篙搖櫓承天秪管坐地看揚州既然如是且道將甚麽報答諸人良久云誰知遠烟浪別有好思量師云金山者裏則不然雖有一隻鐵船也不用文殊普賢招頭把柁也不用觀音摩詰打篙搖櫓有時撐過江南有時放過江北通身泥水滿面風霜為甚如此只要諸人親到者裏且道到者裏後如何有時乘好月隨我過滄洲敢問諸人山僧道底與端祖道底是同是別具眼者辨取舉當山十六代圜悟勤祖上堂云月圓月望月旦月朔斬釘截鐵堆山積嶽小乘錢貫大乘井索有漏笊籬無漏木杓定龍蛇句全殺活散向諸方任貶剝叅師云依稀似曲纔堪聽又被風吹別調中江陵天隆監院東旭率蘇息吾居士等供法衣請上堂問大庾嶺頭提不起豈從雞足付將來和尚法服從何處得來師云急著眼覰進云靈山一會儼然猶在師云止止不須說進云大千俱捏聚祖令正當行師云可知禮也進云恁麽則知恩有地師云劄問文殊普賢昨夜起佛見法見貶向二鐵圍山且道是神通妙用法爾如然師云見義不為無勇也進云鴛鴦繡出從君看不把金針度與人師云衲子難瞞進云玲瓏巧石開心眼冷地廻波看主人師拈拄杖僧便喝師亦喝僧擬進語師便打乃云十五日已前無風起浪十五日已後浪靜風恬正當十五日道泰時清林泉樂業雖然如是太平本是將軍致不許將軍見太平復舉阿難尊者問迦葉師兄世尊傳金縷袈裟之外更傳甚麽葉召阿難阿難應諾葉云倒卻門前剎竿著師云二尊者恁麽問答雖則有賓有主有照有用爭奈行海放不過在脫或有人問山僧世尊傳金縷袈裟之外更傳甚麽但提起袈裟角云定光金地遙招手智者江陵暗點頭清天笠珍禪師嗣箬庵問南嶽下三十六世傳臨濟宗示眾舉宋時本山達觀頴禪師首參太陽元便問洞山特設偏正君臣明甚麽邊事陽云明父母未生時事頴云如何體會陽云夜半正明天曉不露後參谷隱舉前話復問如何是父母未生時事隱云糞墼子又問夜半正明天曉不露又作麽生隱云牡丹花下睡貓兒即便悟去達觀挑得一擔懞懂換了一擔瞞頇谷隱錯下名言要會父母未生時事三生六十刼金山則不然若有問父母未生時事向道牛頭馬面夜半正明天曉不露又如何荅云芳草碧嘶韓幹馬綠楊影擊戴嵩牛恁麽答話不惟使十八高人當下瞥地直使現前大眾一箇箇如龍得水去也設或佇思都被牛頭馬面吞却示眾要叅臨濟禪莫將問來問你若胸中纔有個問老漢若有一句答你只明得賓中賓未識賓中主在直饒問在答處答在問處只明得個賓中主未識主中賓在直饒答不在問處問不在答處只明得個主中賓未識主中主在要識主中主麽未上船舷先喫棒隔江招手去還遲示眾舉應庵老祖道蜻蜓許是好蜻蜓飛來飛去不暫停被我捉來摘却兩片翼却似一枚大鐵釘老祖慣用者隻鐵釘釘瞎諸佛諸祖師天下羣生眼睛今晚落在金山手裏不免抅直作曲抛向郭璞墓前還有人收拾得者麽驀豎竹篦云負命者上釣來晚叅掀翻海嶽撥轉乾坤須是沒量大人始得若也佇思停機且緩緩著德山入門便棒家肥生孝子臨濟入門便喝禮義出豐年金山者裏不行棒不行喝凡有來者但舉拂子云者是曹家女未甚嫁了白拈賊擬議即趁出且道還有為人處麽但能莫觸當今諱臨濟德山俱赧顏清香林淨禪師嗣鐵舟海南嶽下三十七世傳臨濟宗掛寺額上堂怒猊頒賜九重天渴驥奔嘶中泠泉浩蕩恩波霑帝澤仰祝皇圖億萬年輝煌金剎昂霄逈鬱秀琳宮湧翠連香惹御爐花欲濕山留宸翰日長懸於斯長也風恬浪靜海晏河清萬邦寧謐八表歸仁且道林下臣僧如何恭謝捧拂嵩呼云日月光天德山河壯帝畿聖明何以報願上萬年書頌德山托缽遇著出門風色惡狂濤浩浩打頭來轉篷直入蘆灣泊釣罷月明滿載回頌夾山叅船子竹林不出奈他何及到秀州鼓碧波釣得錦鱗歸去後清風月映至今多清法乳樂禪師乃鐵舟海禪師法嗣南嶽下三十七世傳臨濟宗佛誕日鎮海將軍董大護法請上堂師拈香祝慶畢舉世尊初生一手指天一手指地周行七步目顧四方天上天下惟我獨尊雲門云我當時若見一棒打殺與狗子喫貴圖天下太平瞿曇傍若無人不知正是嚼飯餧嬰兒韶陽雖則正眼流通未免傷鋒犯手怎似董大將軍不施一刅不展一旗能令河清海晏國泰民安且道得何三昧坐致太平如此一點丹衷如曉日高懸宇宙照江天丁丑元旦諷誦欽賜御筆石刻金剛經上堂拈香祝聖畢遂舉起經云此是釋迦老子於祗樹園中說不盡底細大法門數千年後復從當今至尊筆尖上流出欽賜江天永遠供奉幸值元旦良辰特命四海高流焚香諷誦一言一句皆從一毛頭上放大寶光徧照百千萬億世界內國王王子百官緇素乃至情與無情一切倉靈同明船若正因其證金剛三昧以此無量無邊功德慶祝聖壽無疆萬民樂業風烟永息天下太平金輪與法輪共轉舜日並佛日同輝秪如般若云若以色見我以音聲求我是人行邪道不能見如來畢竟是阿那個如來又作怎生見良久云千祥共祝金鑾下萬國來朝賀聖君下座康熙己卯年四月十八日聖駕南巡三幸金山至五月初一回鑾直郡王設齋謝恩上堂僧問幸逢三次駕親臨泉石增輝萬類欣惠澤𡙆𡙆彌宇宙師將何法報皇恩師卓拄杖進云寫出琅函來水國鑄來寳像鎮金鼇如何是光大法門句師云杲日麗中天進云處處昇平歌舜日家家咸若戴堯年如何是黎民樂業句師云含哺鼓腹進云九重雨露九州溢萬里江山萬世清師云也須與麽道問薰風解愠南巡日林下相逢事若何師云一人有慶進云棒頭點出金剛眼麈尾揮開淨法身如何是淨身師呈拄杖云見麽進云如何是金剛眼師打云放過則不可進云江天萬古傳心印弘振祖風滿大千師云站過一邊問賓主交叅即不問君臣五位請師宣師云逐一問將來進云如何是君師良久進云如何是臣師云開口落二三進云如何是臣向君師云禮拜了退進云如何君視臣師云識得你進云如何是君臣道合師云大家在者裏進云五位君臣蒙指示祝延一句作麽生師云天長地久日月齊明乃云佛祖大法周遍乾坤在天同天在人同人示現國王王子文武羣臣權衡造化際會風雲堯天蕩蕩舜日欣欣撫萬民如赤子視三寳若家親幸山敕寺賜帑題名江天生色祖席增榮如此洪恩將何報答揮拂子云金鼇背上栴檀繞願祝吾皇億萬春己卯四月十九日皇上駐蹕金山面奏準磬山修祖語錄入藏至庚辰正月初九日內織造曹公兼署江南江西總督陶公委江寧理事同知賁江寧縣陳同送版入南藏上堂皇圖鞏固帝道遐昌佛日增輝法輪常轉以拄杖指錄版云汝等諸人還見麽佛心天子絲綸布磬室宗風萬古傳下座遂送入大報恩寺大藏殿庚辰二月二十二日進京謝恩至三月二十四日辭駕出京皇上手賜菩提葉帽回山上堂非俗非僧一老翁天冠高頂鎮金峯有人若問酧恩句杲日騰輝萬象中喝一喝佛成道日江寧織造府曹大護法設齋請上堂僧問文殊是七佛之師因甚出女子定不得師云為汝不唧𠺕進云罔明出得意旨如何師云一犬吠虛進云佛與眾生同一鼻孔出氣因甚有出得出不得師卓拄杖云百雜碎乃舉楚石奇禪師上堂云如來明星現時成道且道半夜裏瞌睡的還見明星麽非惟半夜裏瞌睡的不見明星縱繞不瞌睡的向明星下走過千遍萬遍秪恐瞌睡猶未惺在畢竟惺後如何年年有個臘月八滿天星斗挂梅梢或有傍不甘的出來道秪如卒風暴雨明星在甚麽處但云若向織造府前躲避時自有沒量大人為汝指示便下座示眾破一為三攝三歸一識得一生死畢會得三透祖關祖關透頂門隻眼明如晝生死畢裂石之機似箭劈碎却三拈却一新婦騎驢阿家牽等閒踏破蒼龍窟咄清河達𤇍禪師乃鐵舟海禪師法嗣南嶽下三十七世傳臨濟宗示眾云眾無多寡貴在真純道絕功勳惟期透徹栴檀林幸無雜樹如意寳不類他珍孤峯百尺翠摩天洪浪千層寒潑面面面洞彰刼初消息明明顯示古佛真機果能一笑知歸便見心空及第顧左右云相期共作中流柱奮志追還上古風結制上堂浮玉峯頭爐鞲開些兒火種自深埋乘時引發金剛燄璞玉混金輥作堆猛烈士全機拶入伶俐漢點著便回髑髏門正眼黑豆爆寒灰疑團驀拶虛空碎赫赫紅輪遍九垓解制上堂把斷要津佛祖無趨承之路放開線道人天有相見之期時逢臘盡春回道在心融境寂處處風光溢目塵塵條令斬新草鞋尖踢出百千祖師拄杖頭撥轉洹沙諸佛切忌循途守轍直須就路還家饒伊剔起便行何似從空放下儂家不管興亡事盡日和雲占洞庭萬壽節鎮海將軍馬欽命織造曹副都統崔黃諸大護法率同八旗四營請上堂拈香祝聖畢云江心瑤島碧崔嵬丹闕珠樓向曉開遙望天庭申祝頌一爐香散妙高臺歡騰海宇春滿寰區為九霄瑞應之辰實萬國光華之旦冠裳普會同傾葵蒮之心法象欲陳共祝同陵之算景星耀而泰堦平化日舒而卿雲集龜龍麟鳳並萃瑞徵蠻貊萇夷咸臻壽域雲中野衲化外逸民既荷殊恩特輸誠悃豎拂云仰祝聖君無量壽萬年松上一枝藤下座天使賫人參瓜果諸珍至謝恩畢陞座異味奇珍色色鮮恩膏頒自九重天微軀深愧難圖報直使心同鐵石堅海外殊珍上林嘉味聖君頒賜天使賫來歡聲動江國春雷惠澤沛九天湛露隆恩異數揣分踰涯草野之臣若為秪受良久云惟憑一縷栴檀氣仰祝仁皇壽萬年小叅黑月白月作無殊別生魄死魄妄生卜度空外無雲眼中离膜玉鑒光寒氷輪影落驀竪拂子云仙桂高攀正斯時廣寒宮殿無關鑰晚叅三拜得體一笑印心圓相著點缽木投針袖頭打領掖下剜襟速則易改久則病深選佛若無宗正眼真風那得到於今清量聞銓禪師嗣法乳樂南嶽下三十八世傳臨濟宗師在金陵蔣山香林寺受請陞座有負垂天之翼方能搏萬里長風具截眾流之機乃可破千層巨浪山僧一句晏坐鍾山目視雲漢上無攀仰下絕已躬直饒千聖到來敢保鉗口結舌不意祖庭虛位使命徵行既然回避無門只得一肩擔荷所以道人行履無固無必有時向十字街頭垂手却在孤峯頂上興慈有時向孤峯頂上興慈却在十字街頭垂手須是過量人方行過量事今既聲和嚮順正當換步移身貴圖正眼流通那顧拖泥帶水且符到奉行一句作麽生道自信平生有仙骨好風吹上妙高臺下座入院上堂僧問金陵豎起剎竿楊子江心垂釣闡揚石磬宗風發宗佛祖心髓如何是開堂聖底一句師云地久天長進云恁麽則皇風與宗風並扇佛日與舜日齊明師云道得恰好進云全憑補衮調羹手撥轉如來正法輪如何是砥柱中流句師云御碑亭子立青霄進云德山用棒臨濟用喝未審新江天用個什麽師豎拂子云唯此一事實進云作家宗師天然猶在師云莫來塗污進云大抵還他肌骨好不擦紅粉也風流師便打問一毫端上現寳王剎坐微塵裡轉大法輪此是和尚尋常作畧未審新主江天如何施設師云斬釘截鐵進云登先人之堂入先人之室如何是入室句師云識法者懼進云據先人之座行先人條令未審作麽生行師云點水滴氷進云掀翻海嶽求知己只如知己到來作麽生接待師云侍者點杯茶來進云謝師厚疑師云三十年後此語大行問金鐘纔扣人天普集靈山會上何似今日師云今之古之進云大振宗風即不問公案重新事若何師云昨日陰今日晴進云楊子江中輝化日妙高峯頂鼓雲雷師云瞻仰有分乃云壁立孤峯千山稽首潑天門戶萬派朝宗揭示摩醯正眼提持向上弘規拈一機則羣機頓赴示一法則萬法週圓明如杲日濶若太虛大用天旋不存軌則揮金剛利劍勦絕聖凡之窠臼用格外鉗錘斷送衲子之命根古佛家風再展大人境界全彰直得楊子江心風恬浪靜妙高峯霧散雲收日月爭輝乾坤朗耀堪報不報之恩共助無為之化正恁麽時祝延聖壽翊贊皇猷一句作麽生道遂躬身云金輪統御三千界寳祚綿延億萬年闔山耆舊師設齋請上堂云太虛無向背大道沒邊中至理絕言詮大公忘彼此若是沒量大人開山僧與麽道不用如何若何正好一肩擔荷直下如天普蓋如地普擎如日普照如風普扇蕩蕩乎廓週沙界塵塵爾充塞十虛無所希求風雲際合不消彈指樓閣門開古佛家風依然猶在祖師法印妙用全提到者裏自然高超物表獨步大方任運陞騰隨緣自在正恁麽時畢竟功歸何所但願皇風成一片莫教建土列封疆下座元旦上堂師拈香祝聖畢新日新年新主人舊山舊水舊叢林彌天瑞氣繽紛落共祝吾皇億萬春下座移新方丈小叅古人道若得一回汗出一莖草上可以現瓊樓玉殿其或未然縱有瓊樓玉殿却被一莖草蓋覆辯金鍮別玉石不無古人揀點將來大似徐六擔板話作兩橛江天者裏折東籬補西壁拾短從長開方便示真實平高就下且道為甚如此雖然舊閣間田地一度嬴來一度新下座示眾金鰲峯頂玉樓臺面面軒盡豁開欲問江天端的意波濤萬里自西來下座聖節日鎮海將軍馬副都統崔黃三大護法同設齋請上堂管本山防禦張景二護法引師陞座拈香祝聖畢僧問天垂寳蓋地湧金蓮一會靈山儼然未散如何是祝延聖壽句師云庭前古栢叅天秀進云金輪永鎮三千界聖德威嚴萬國尊如何是地久天長句師云巖畔青松插漢青進云縱有虛空廣長舌贊揚不盡聖明君如何是尊貴句師云垂衣拱手進云恁麽則日月光天德山河壯帝居師云慶遇一時問人天普集勳貴臨筵自他兩利即不問君臣五位請師宣師云大哉問進云垂裳治世尊貴天然如何是君師云堯眉八彩進云保障萬方屏維四海如何是臣師云舜目重瞳進云身離鳳闕三千里心近龍顏十二時如何是臣向君師云將軍塞外絕烟塵進云天心常眷戀丹詔屢褒榮如何是君視臣師云王令已行天下遍進云佛心天下道念宰官如何是君臣道合師云驗在目前進云前問已蒙師指示即今萬壽良辰如何慶讚師舉拂子云薦取者箇進云恁麽則華封三祝不獨唐堯師云確乃云瑞分剎土春滿寰區一人端拱無為萬物各得其所是以頂天立地感荷皇恩含齒戴髮均承帝力大眾還委悉麽今日乃我大清聖主皇帝陛下降誕之辰鎮海將軍親率寮寀恭集此山啟建萬壽無疆道場仍命山僧陞于此座舉揚大法用展丹葵直得日月星辰全彰妙明心印昆蟲草木咸沾殊勝恩光和風匝地花雨彌空福蔭南天慶集北闕林下道人無由報答僅成一偈畧表微忱海天空濶妙峯高玉殿瓊樓聳碧霄羅列香花陳妙膳嵩呼萬壽祝皇堯結椎下座千秋節啟建師拈香祝延畢乃云五月天中節儲君隆誕辰福流千界月慶集一人身林下潛修士焚香演梵音願消黎庶三灾刼睿算彌隆億萬春晚叅師卓拄杖云上通下徹地轉天旋繞門綠水隔岸青山經行及坐卧常在于其間雖然善財叅後誰相訪樓閣門開竟日閒下座晚叅舉同安否禪師因僧問如何是和尚家風安云金鷄抱卵離霄漢玉兔懷胎入紫微僧云忽遇客來如何抵待安云金菓早朝猿摘去玉華晚後鳳衘來師云絲來線去玉轉珠回偏正相承惟明尊貴此是同安老漢為人處金山則不然或問如何是和尚家風但云得人一牛還人一馬忽遇客來如何抵待向道我不敢輕於汝等汝等皆當作佛記重建水陸堂記宋曾子固撰慶曆八年潤之金山寺火明年寺之僧瑞新來治寺事某月擇山之陽亢之地勸州之人某氏為水陸堂積錢之數百三十萬積日之數若干而成夫金山之以觀遊之美取勝於天下非獨據江瞰海並楚之衝而演吳之要也葢其浮江之檻負崖之屋椽摩楝竭環山而四出亦有以夸天下者則天下之東馳而莫不顧慕者豈特一山之好哉而其作之完葢非一人一日之力及火余固嗟夫嘗得與時之君子者遊而縱夫余心之所樂焉至于今未久也則聞夫山之穹堂奧殿環傑之觀滋起矣此非佛之法足以動天下葢新者余嘗與之從容彼其材且辨有以動人者故成此不難也夫廢于一時而後人不能更興者天下之事多如此至於更千百年委棄鬱塞而不得振行於天下者吾之道是也豈獨牽於勢哉葢學者之難得而天下之材不足也使如此寺之壞而有新之材一日之作軼於百年累世之迹則事廢者豈足憂而世之治可勝道哉新方以書告某氏之世善而其子某又業為士因以求予記堂之始故為之歷道其興壞之端而并予之所感者寓焉重建佛殿記宋洪邁撰江自岷山而下歷巴夔湘楚包吞前沫橫漾浯流沱潛澧沔金巨川數千百演迤橫放薄于朱方極沛以大然後東入于海舉天下之水莫盛此焉金焦兩山崒然天立鎮乎中流皆有大蘭若岧嶤其上古記謂紫金浮玉者是矣浮玉處其左如幽人逸士巖棲谷隱恐入林之不密故航葦罕至而僧居觸事隨亦泯歇惟紫金超遙擅勝不復與同蕩然開闢八面應敵所謂江心一峰水面千里潭月雙暎雲天四垂真能雄跨東南二百州如宸章所表揭者千颿下來萬客鱗萃魚龍之所慿怙人天之所賓悒古今推勝無得擬議寺舊名澤心天禧中真宗皇帝感宵夢所抵更為龍游飛帛扁額以賁方來室廬崢嶸槩與境稱遭罹魔劫鞠為燼墟中興以還視力開葺軍帥劉寶奮營大殿幾成而厄于火明年郡守韓及祖又嗣為之築于道謀旋即蠧敗淳熈四年樞密沈公復出治慨然嘆曰吾行四方多矣未有如此剎者住山非本色人其可哉乃卑禮厚帛延金華藴𠂻師于焦山俾主張是舍寂而居囂去安而即煩人以為介介師不屑也徧行其彊悲智歘起自念己身逢此壞相亟倒空鉢囊先眾募捨前所未及一切趍新展前資以安耆舊抗塔院以壯瞻睹壽坊經室庖浴廂縈易翳為明寬潔敞靚江濱故址隘而不舒累石拓基堤護榆楊作屋二十四楹中建亭命曰烟雨奇觀游士戾止洗心儲清又捨法施為後人買田六十頃唯雄殿尊居役鉅費侈居之六年而後敢議擇廉謹僧入閩即山伐木如約浮海歸命黿鼉而協謨節定星而揆日道充于內而跡彰于外其聲遠揚如谷應響施者惟恐不克豐其獻匠者惟恐不克既其巧度為崇五十有五尺為廣七十有四尺縻錢六十萬閱四寒暑而成廓如穹如輪奐華奕卻顧城闕根塵聿清前瞻海潮法音如在吳頭楚尾莫之與京功甫訖師移錫錢塘靈隱邦人願有記使來謁當紹興之季戎馬飲江暴骨堆莽是時長老淨信誘化童隸收拾瘞藏予再奉使往來親見為之啟于太上被褒寵而僧徒二十人則予兹山疑若有宿因故書而不辭殿經於癸卯之孟夏成於乙巳之仲春而記於丁未之秋八月實有二十四日癸巳云翰林學士洪邁撰淮東路總管吳踞題額住持淨全立石萬壽閣記元虞集撰南徐古治限大江之堧受眾川之委東趍而將至于海也其浸汪洋以無涯其流舒肆而莫止拳然屹立中江以迎其衝者金山也山有佛祠始建于晉明帝時梁武帝著水陸齋儀親幸其寺至宋真宗賜名龍游禪寺國朝至大己酉僧應深以天子之命主之兼𢌿以馬薛里吉思所據銀山東西二院且敕使者修水陸大會如梁之儀延祐至治間又兩敕建會如至大故事於是應深以辛酉之歲即寺之右建大閣焉上嚴萬佛之像下肖羅漢之容為位五百後三年今上皇帝潛邸之日由江引舟而親登是閣壯其締搆雄偉而善深之為也出帑金成佛像千以贊之又三年皇帝既登大寳建元天曆三遣使齎名香白金往祠之山祗波神魚躍龍舞幽顯咸若應感著焉至順元年秋應深來朝京師十月乙未入見上御奎章閣奉佛像以進上曰閣中萬佛已莊嚴乎對曰像具而未完以金也上曰朕悉為若成之即出內府寶鈔五萬緡以賜之仍歸以羅漢莊陷江沙汰之田明日應深入謝曰臣僧請以萬佛祝萬壽願萬壽等萬佛上曰朕之崇佛豈𥝠朕躬所願含生均被佛力因名其閣曰萬壽又明日敕學士臣集勒文以記之臣集聞諸浮屠氏之說曰充乎法界一佛身也何有於萬及其化現至百千億恒河之沙析為微塵猶不能擬豈萬可言用像設教取數于圓以表也臣請喻之以言今我聖皇運至善大慈之心位乎億兆萬民之上一念慮之善一佛之全體也一號令之善一佛之大用也一日二日已具萬機至于歲時積善無數即佛之言非萬可計然則聖天子萬施之施豈獨見于斯閣而已哉有生之類無間遠邇大小知上之念己也仰而望之一一如視涵上之恩惠焉辟如瞻日於天人各見日如日視已不知所見共一日也觀月於水人各見月如月視已不知所見同一月也散之諸有名之為萬歸之於無其實一佛也一佛萬佛也我聖天子一佛萬佛之所具乎一佛之壽已不勝計即至萬佛其壽無量即壽即佛即佛即壽是故斯閣可得而名矣請書其事以諗諸來者而深之勒亦得繫於無窮焉勅賜大藏經記明王肻堂撰皇上以孝治天下以天下孝養聖母而聖母慈聖宣文明肅皇太后以萬物得所為心不私其養每推服御之餘以為利濟事如藥餌橋梁之屬歲縻金錢不訾而尤加意于佛事增刻此方撰述未入大藏者四百一十卷出金繒摹印裝繕全藏以賜天下名藍及高僧所棲之處千箱遙郵傳不知豈非以三藏聖教奪群生三塗八難之苦而予以涅槃之樂尤為利濟之大者歟維兹金山峙大江中流鎖鑰南徐山川之氣不使隨波蕩散以為運道之咽喉舊京之門戶相傳其下即為龍宮雷咆電激無風自波舟出其上者有戒心焉識者以為宜得竺乾氏之教鎮之故名德多出世其間有宋盛時棒喝如雷龍象如雲為名叢林矣厥後法道陵夷宗風不振崇臺飛觀徒資遊眺伎樂殽醴跳踃紛拏寺僧不能禁或反以為利過者傷之有僧空滿從北方來結廬危巘下髮不薙足不履蕭散夷遠類有道者學徒景附始累甎石為重閣十年間鬱成精舍四方雲衲往來大江南北者始有駐足之地而滿躬筦鑰操作為行甚苦以愧世之安享利養者寺舊有賜藏殘闕不完滿乃與其徒如然至京師時天下乞藏者聞風蝟集所司厭之不敢以聞然猶內降香藥紫方袍賜滿以歸而如然獨留誓不得藏不已淪落長安中者五年肻堂時讀中秘書每馬上見之踽踽稠人中若有所失而求之者雖摧辱萬方不為動有識者咸謂滿業已受賜歸機會既失必不可復得徒自苦耳雖譬曉百端不為止時刑部郎中吳撝謙嘗守鎮江素敬禮滿見而憫之乃屬肻堂為題疏令資檀信具楮幣摹印不必仰煩宮掖而朝之大僚暨諸從官鑒其誠咸樂助之可得二百金于全藏費尚闕四之三肻堂且予告歸矣未幾有以金山賜藏且至告者肻堂未之信已有僧從山中來訊之果然乃為大喜過望蓋內侍周珣因內奏事牌子趙媛以聞聖母大嗟賞取二百金者以付內侍張本益以金繒不月而就時緣海有警他藏悉尼不發而獨此附便差舟以南故若是其速也於乎非我聖母皇上弘法度生之心無微不通曷克臻此而匹夫一念之誠可以動天地詎不信夫昔山蘇氏記李氏藏書以謂前輩得書之難日夜誦讀惟恐不及今人得書之易宜所得倍蓰前人而皆束書不觀遊談無根為可怪夫寧獨世之學者而已彼學出世法者猶不能免焉禪莫盛于唐宋時而是時藏經傳寫不易猶未大行南渡以來雖有刻本得之艱甚及我祖以佛法輔儒教而行兩都並有刻而北藏尤精名山大剎賜本往往而是顧得法聞道者壹何尠也葢人情以得之難易為重輕誠有如蘇氏之所歎者今此藏始得之嘗難矣及夫誠達帝閽丹函綈袠如取諸寄而舊藏亦補綴畧完得無覩今之易忘昔之難矣乎夫人不幸而為世法所𦊰無論也業已棄父母妻子為佛弟子矣而亦束書遊談玩愒時日虛消信施余竊痛之苟能立為程課以此身心浸漬其中一念既專六根俱聚覔昏沉掉舉了不可得則何誦讀之非禪定如讀楞嚴則思萬法無一堅固者何以為一切究竟堅固讀法則思始敘將說法已即讚嘆法無一語正說法者所謂法安在開卷皆疑也因大疑而得大悟則何教之非宗不然藉口前人語以一大藏教皆拭瘡膿紙而弁髦之即無論聖母皇上弘法度生之心委諸草莽而法門之波旬即此其人將如業報何學者其朂且戒哉如然以肻堂嘗經紀其事過而請記因述其顛末申之鄙意以為大眾勸妙空岩記明周忱撰金山之東麓有岩焉𥓂砑洞豁縱廣數丈許居其中可當屋四楹然其上崖㟧疊出有傾側之勢下則藂石隱起作礧磈狀荒茅篁竹又蓁翳于其前故高人勝士不以為奇而蹤跡未嘗至前住山敏機聰上人作竹院退居于其旁已十餘載亦未之顧也宣德五年秋余至京口暇日過金山啜中泠泉陟妙高臺坐楞伽室進至絕頂倚吞海亭窮極勝覽然後退坐于上人之竹院始覩是岩謂其可以居也因俾上人營而治之後二月予復至焉則向之傾側于上者補以簷楹列窗戶而正向之礧磈于下者足以土石加甓甃而平矣其前之蓁翳者亦芟治而為徑路矣入其中几案床榻熏爐茗椀無不具矣徘徊瞻顧則岩之深與廣逈若有增于昔時因為名之曰妙空岩求駙馬都尉沐公為書三大字揭而扁之且告于上人曰兹岩空洞之妙出于天造地設自開闢以來然矣何其晦于昔而顯于今耶葢有賴乎上人之窗戶甓甃也窗戶甓甃非岩之本體而岩不能無賴之者非此則傾側者無由正礧磈者不得平終於蓁翳而妙空之體不足以表見也嗟乎一岩空洞之妙尚有賴于營治之力曾謂人之有身而可以頹堕委靡不事修飭乎佛家謂之定慧必由戒律而通於此亦可以取譬矣上人曰善請以是為記使後來者知所警上人名善聰博學而嚴於戒律嘗與予同修中秘書余是以為之記云金山遊記明鄭懷魁撰玉京縹緲向峴首以雲浮金界崚嶒聳澤心而岳立限大江於南北宛在水之中央靈山湧巨鼇之區瞿唐失如象之險上有瓊樓琳宇金碧曄以輝煌翠壁丹梯葱蒨紛其環合境超欲界望若仙居其下則有蛟龍之宮黿鼉之宅躨跜夭矯驚大鳴於洪鐘隱見沉浮荅清聲於方響下元秘府既上應乎天垣中泠名泉廼潛通乎地道然而梁朝勝會虛傳水陸之塲晉代靈丘已成陵谷之變惟見殘碑斷碣清江白雲而已臨水登山憑高望遠臺三休而始上峰七盤而遂躋相輪聞鈴鐸之音合尖窮階檻之勢游極重巒之柱浮提邈以三千六通四闢之都窣堵吞其八九意軒翔而欲舞腋翕習以如飛既乃月上滄溟地懸山河之影雲銷江渚星輝牛斗之墟氷天與雪巘同清銀漢共金波爭曜信足以發皇耳目瑩徹心靈者矣二儀已會於旁羅萬象隨移於轉顧不有凌雲之筆孰標出塵之觀㧞地孤根屹長撑乎江紀磨崖片石慚仰荅乎山靈遊金山記明馮夢禎撰金山在大江中不能三十仞中藏寺上有浮屠兩岸烟火相望與焦山北固稱京口三山渡者望之培塿耳而遠近異勢峰巒互變隨波濤上下唐以來題咏甚多惟稱張祜塔影鐘聲句它俱可芟山傍小峰離立或名郭璞墓或名善財石際郭璞墓水最洑下有甘泉汲者截竹為筒去上下得泉陸羽所稱揚子江心水為第一泉者是舊有標識僧病其艱取去之指井當之大不稱世無陸公誰辯泉品噫豈獨泉哉宋時佛印元公住持此山蘇子瞻往來叅扣為不能酬四大作禪牀輸卻玉帶鎮山金兀术兵過失去韓蘄王料兀术必過金山伏兵龍王廟兀术果與數騎至廟兵誤先出兀术墜馬躍上得脫去余每徘徊不能捨去本朝景泰間北藏板始完印賜三山百年來獨金山藏缺失數少余萬曆庚辰侍先封君過三山遍得隨喜而金山果沙彌者發心寫補并剏藏殿許為匡護因極力從臾之壬午補官復侍先君遊自癸未遭艱甲午自畱翰內轉戊戌解南司成歸俱從大江俱不及登金山而果上人音耗不絕今歲乙巳冬十一月余出吊江都李氏而返汝唐客部見送方侯啟閘因約遊金山既至僧來迎迓時果上人已稱耆舊趨而前云補藏與藏殿兩緣俱幸畢事專俟公作記耳僧虛舟延至水月樓已迫暝色客部倦坐余洎諸客從果上人禮藏殿讚嘆久之索額題之曰龍宮寶藏殿之左曰淨業菴其左一室果掩關寫經處承檐修竹十數竿不礙眺望菴之右為德雲樓樓下址連妙高臺臺自佛印時得名坡公嘗登此暮不及竟覽歸飲水月樓更之江月殽兼葷素肴及名酒客部所擕葢客部不耐素云客吳人二陸合奏絲竹甚佳惜不能和佳曲耳客部宿江月而余宿淨業與胡仲修沈伯宏俱其明日早登吞海亭昔遊亭圮後重修亭直海亭一望淼渺亭在浮屠前更上為絕頂畱雲亭亭後餘址尚堪他構為叢所有由吞海亭覓徑而下至江天閣更前則僧虛谷者建一樓面西中有大士頗廠堪眺上游諸勝樓北置梯梯東一禪房甚幽可臥坐樓中久之濤聲清耳字之梵音閣又僧持心者稱余舊居停延坐其樓亦南向左塞右通客部字之無礙樓又出詩冊見示中多閩士詩陳肅翁師公衡儀部曹能始俱有詩追念公衡不覺泫然僧太虛設早齋其樓樓面北登之寒威偪體下徙始安樓左一堂尸祝李汝培中丞以魯中涓配葢位可左右客笑中丞得左當是假靈吾輩耳汝唐亦胡盧不已過中淨業菴畱連德雲樓妙高臺見一官鷁在江中流欲向京口四漁舟帶纜或疑余舟又有疑其非者已從汝唐及客隨喜無梁殿繡頭所居繡頭者山東人居此二十餘年昔嘗一見勸余勿絕仕進今歲九月又訪余西湖其人葢修習華嚴法界觀者誤傳未返廼從關中相見欲畱余宿以戒舟江北辭之遂與汝唐諸客別于瓜洲登輿踪余舟至閘則午前已渡江妙高臺所見良是復覓渡之金山晤二客亦無耗久之老蒼頭至舟入京口故來相迎遂與二客共渡逆風到京口達舟昏黑矣是遊也李客部為政沈伯宏從臾余初無意也客部曰使金山悵望過門不入可乎余之過門不入屢矣豈敢重得罪于山靈既至如久客乍返眷屬歡踴佛廬僧舍路徑參差半屬新治喜果上人寫藏緣就記諾未償又再晤繡頭三人俱老矣江中懸望不勝依依渡江之三日舟未至滸墅二十里追憶為記金山遊記明吳郡都穆撰金山在揚子江心其勝槩為天下第一弘治戊午秋予與同舉之士將會試春官舟濟中流風恬日麗江平如掌侍行之人咸有喜色十里維舟山下有石並峙其前類雙闕然傳為郭璞葬處入龍游寺酌中泠泉味極甘冽陸氏水品以為東南第一水是也散行登毘盧閣其南為妙高臺半已傾圮上故有楞伽室宋山蘇公嘗書經于此北曰善財樓今與室俱廢上大悲閣既而登吞海亭席地環坐小飲數廵聞畱雲亭據山之巔攝衣登之四望江波渺然臺殿皆在其下令人神爽飛越亭南石刻妙高臺及玉鑑堂六大字披草視之稍下有塔基二南北相向葢宋曾丞相布所建燬於火經觀瀾亭循石級西下歲久石多斷裂俯視江波如行天上足甚危慄頃之至祖師崖中有唐裴頭陀像即開山得金山因以名者也崖之右有洞深黑不可入日向莫由故道出觀龍池僧言旱歲禱之可致雲雨左有龍王祠著祀典有司每秋祀以特豕僧復言山有江山一覽烟雨奇觀二臺回急皆不及遊順風張帆仍飲舟中還𤓰步宿嘗一至江口欲為山遊懼於風濤而未能也今而畢素願殆有數焉而非偶然者矣夫江山猶昨人事靡常吾輩登臨能無慷慨激烈如昔之人者乎遂為記之以貽諸君金焦兩山記明袁衮撰金焦山屹立江中流險峻而奇然金當潤州之咽喉渡江者苟好事必遊焉而焦山則僻故遊者特鮮余之遊金者再矣而焦獨闕庚寅之秋余將北轅也乃有事于金焦焉時秋高氣清天風和融水波寧緩窮日而遊兩山亭閣軒臺攀躋畧盡客曰夫兩山者孰勝袁子曰金狹而巧所眺者廣焦廣而幽所眺者狹此兩山之槩也夫江發于嶓冡赴于海而潤州者當其下流江之奔也勢若赴壑金焦者適當其衝束其隘口截之使緩此兩山之功也昔余有四方之志焉如浙之天台雁宕閩之武𡗝江右之匡廬荊湖之衡嶽武當洛之嵩邙魯之秦山晉之恒霍秦之終華蜀之峩劍閣咸思縱觀以畢吾願未遂也葢所覩巨麗者三焉曰震澤曰大江曰黃河此天下之大觀也而金焦者抑又其次乃于是作遊金焦山記遊金焦兩山記明董傳策撰余渡淮而南爰以六月五日渡江于時江流浩浩大風俄起江中浪高于山葢余又得奇詭觀焉既而風收浪恬日照江面舟子語余當渡余小子策從家大人偕兩友人渡而甚𡗝也無何望見金山家大人暨兩友人欣然欲登余葢已兩度登云既結纜甫登江岸遽有黿上而仰食入寺縱觀復循廊瞰江外鍾山諸勝宛如在目余卑六朝之偏安頌高皇之大烈慨然有覩河洛而培豐邑之思焉已而越毘盧閣入憩觀音殿遂由舊逕出寺摩閱古今人詩刻尋中泠泉吸之復汲以烹茗甚清甘日晡放舟泊北固山下家大人先還家明旦廵院尚仰山君過訪語奮然有奇氣且云明時浩蕩遷客多得奇遊余三人遊興方銳又監押官未戒行仰視日方中廼遂復放舟焦山余葢亦未嘗遊云山視金山殊大其上僧寺幽閑旁布田疇更平曠慿闌而瞰江洲令人飄飄然有物外之適山以焦光名於是張生為作招隱辭而余與吳生和而題之壁俄有騶從來乃鎮江郡守都君蘇郡節推王君知余三人者當遊因以廵院意擕酒殽相隨從既見歡笑口誦壁間詩復徧遊歷碧桃灣青玉塢諸僻絕處薄暮還渡江兩君從陸去余三人乘月泝流江澄于練鼓柁鳴楖豪興輒發而余與兩友人評兩山之勝則謂金小而麗其望遠焦曠而幽其棲息亦惟人所愛好焉然潤當大江下流水勢入海甚近而兩山相對束隘口實有砥柱洪流撑峙江海之勢屬者島𡗝竊發沃土為墟江南民力竭矣聖明軫念元元數督過諸守吏誰能假兩山之靈為我畿輔拯淪溺也兩友人曰余輩忽漫遊耳君慎無多語乃記而藏之笥中遊金焦兩山記明王叔承撰丙寅五月同陳貞甫范伯楨仲昭兄弟為金山遊自京口渡江而西數里及山由修廊左折入寺廊壁嵌古今碑題數十百虛敞臨江寺中觀中泠泉亭而井之水經品為天下第一云又左右三四折數百步至吞海亭又上則畱雲亭亭立絕頂所謂妙高峰也東顧海門南絕吳越上游北襟淮揚長江自岷夔湘蠡湧天西來分下山足兩岸商舟萬計檣立如林江山奇勝飄然神爽下峰而南至江天閣懸空俯江大可憩望輒倚欄觴咏可二時許見月出江上輒徙酌寺門面石簰山地飲山即郭璞墓釃酒弔之則暮潮與明月作白如大雪垂天江寒逼人不知為夏又漁舟明滅波際如畫工寫意家素縑飛灑水墨也忽憶異時同商任叔陸伯玉遊此今商生客死陸生病不果來死生離別覺江水悠悠者山有日照崖頭陀崖朝陽洞龍池會暮夜不及遊水有善財石亦曰鶻山分狀證之葢兩肖也月下捫張清河詩碑指識其字識者謂張後無詩或又誦杜少陵吳楚東南圻乾坤日夜浮之句云遊金之明日遊焦焦山去金山下流十五里是日風大逆舟人揚帆就風橫折而下倍直道六七乃抵山其半有關侯祠飯焉去祠左折上登佳處亭榴花甚吐童子折一枝佐飲見山下江船亂流僧曰漁鰣魚者斤可十八錢買而及釜猶鱍鱍生動也右折而上至吸江亭則亭對金山而高倍畱雲山亦大于金金山峻絕當津渡要衝遊者易焦有田可稻麥山根多巨奇石如乱獸臥草中草樹四垂如衣女蘿衣者固幽僻藏勝夫金焦伯仲山也乃坐焦而酹金云頃之客有買鰣魚來者果鮮活色青鰓微開合遂烹魚酌水晶菴石庭菴噉江又面隔江石壁不減金之長廊耳會日暮雲垂垂且雨乃濯足江渚而去按東漢焦光隱此三詔不起山以名今嘉靖中楊繼盛又大書椒山二字于壁及其名氏月日椒山楊所自號也葢焦椒同音或其自負楊後竟以劾奸論死忠臣處士名節畧等陳子曰焦山亦云椒山矣畱雲亭記明彭祿撰金山在京口江中每風四起勢欲飛動昔人謂之浮玉山良有以夫山上有寺寺舊有六亭今惟存其一曰吞海餘皆久廢景泰甲戌郡守白公祀金山之暇訪古懷興乃命主僧弘霔作亭于山頂因舊址也越明年夏六月而亭成高明雄傑叅絕霄漢復舊觀也華扁重揭輝映山水昭舊名也弘霔感公之惠徵記于予夫亭以畱雲名豈有他哉或曰晦冥之朝風雨之夕雲氣往往停畱其上故得名云嗟夫江山亭榭非人不傳唐王弘中在連山僧景常建亭以供游息而宴喜之名載諸簡冊宋歐陽永叔守滁陽僧智仙築亭以備宴多賞而醉翁之名垂諸後世今弘霔之作亭又因公而致余知畱雲與公之名流芳無窮必矣豈待記而後傳耶公名仲賢字希閔陝西綏德人由御史擢郡守所至皆有仁政云景泰丙子中秋之吉重建靈觀閣記明王徽撰金山之陽有閣焉曰靈觀其興替始末志刻莫載莫可考歷歲既久岸石崩塌閣蕩然無存惟餘頹垣壞砌蒙蔽椔翳土像偶軀剝蝕風雨有秀頭和尚者至其處見而閔焉乃募財庀工鑿他山之石伐他林之木而重建焉累岸為基高七十尺有奇比舊益開拓為閣五間重簷覆宇其高深廣丈尺各若干雄偉壯麗畫棟桷榱繪以青碧扉闥窗壁塗以漆堊中塑華光像後塑五顯像旁列諸傳誦及諸神像金粉彩色崇餙尊嚴光炫人目于凡供具罔有不備創始于弘治乙卯八月越明年八月閣成其工木圩墁陶瓦鐵石漆膠之用工價傭役飲食之需費白金餘千數百兩皆秀頭孑身為之者秀頭名定清廣德州民家子自少削髮入僧籍初廣德有耆舊僧來金陵募緣造佛像清與俱來其僧美尚募無所清輒充牣而歸歸即悉與僧後僧頗為私藏清遂棄去聞祖堂山幽棲之勝往棲焉去城南三十餘里梁武時舊剎也殿廡傾側清一見之頃即以興復為己任遂入城募緣重新修造閱三逾歲而功始成其所費比靈觀不啻加數倍又皆清孑身為之者余嘗嘅夫天下自三代以迄于今忠臣義士有功德於民節婦孝子有關於風教其祠廟湮廢於荒郊之墟野水之濱者不知幾處矣安得吾士夫輩有如清者而為之修復哉清質狀朴野語言甚拙澁未嘗以巧令干人人無富貧見者皆樂為施與豈清一誠有以動人也與每募緣暇輒躬薪水以助役夜則入山呌佛蚤暮勤苦不少休頭髮復長出不暇剃及長長又不暇櫛沐髮遂纏結如氊歲久積高尺餘峨然在頂如一塔然雖盛暑間亦不作汗膩氣人見而異之因稱之曰秀頭和尚平生惟食淡飯凡滋味未嘗入口一衲數年寒暑晝夜不脫足惟草履而已先後所募之物貨累鉅萬未嘗以一毫為己私用嗚呼若秀頭者誠可謂戒行精清無愧于學佛者矣士大夫有居高位食厚祿不顧義理取非其有而有者視秀頭能不少愧也耶僧宗文者楚石上人之嗣孫也來求予記遂刻諸石重建觀音殿記明錢仁夫撰金山在楊子江心據南北之要衝作長江之襟帶有此天地有此江山稱重於人舊矣自張處士題詩蘇學士畱帶金山之名益以增重達官顯宦道由江而南北者所必登焉人故以不登金山為欠事山之奇勝前人記述詳矣山有寺寺有觀音殿歲久頹圮寺僧乏力修建徒有嘅嘆乃正德丁丑春督光祿寺尚膳監太監李公和奉勅提督饒州浮梁燒造自北來南過金山艤舟山下入寺焚香禮佛祝延聖壽乃歷覽山之奇勝寺僧惠鐙實與前導行次觀音殿目覩頺圮惻然興念欲與重建因呼寺僧悉來前諭之曰吾受朝廷厚恩得有今日方切圖報而未知所以報也念惟觀音大士誓願弘深尋聲赴感靈應彰彰殿既頹圮吾當重建仗兹願力監我微情祝聖壽于無彊保皇圖於永固庶以盡臣子涓埃之報遂傾其囊施白金二百兩命寺僧徹舊易新寺僧奉命唯謹乃市材鳩工擇日興作經始于正德丁丑二月落成于是年十一月也堂搆侵雲輝暎碧落金山氣象為之改觀亦盛事也寺僧惠鐙輩謂勝事不可以不傳遠來謁余請記將勒石殿廡傳示永久余惟世之稱好事者因輕財重義而得名用財合宜謂之義用財而失其宜其如義何若今太監李公之用財不為私計近以祝無彊之聖壽遠以綿永固之皇圖用財為得宜於義為有合誠當世之所罕見推其一念之義則凡有所監臨必皆盡忠報國知有君而不知有身無一事之不合於義誠出尋常萬萬矣又安可不述而記之以為後人告哉重濬龍池記明吳雲撰余昔躋金山窮名蹟謁龍王廟又得所謂龍洞龍池云者異之攷厥遺牒金山順濟龍王廟即下元水府廟其來最遠建置非一載在祀典龍池一名龍洞水通太江與潮上下或云日照巖西北其處也正綂丙寅工部尚書吉水周文襄公廵撫江南徙廟于天王殿左石𥱼當前若拱若揖若偃若卧江流盤渦人稱龍門而天壍之險意在是乎又鑿池其後深廣僅丈許命曰龍池以神其說其水淵如冬夏不竭鱗介生焉其亦靈恠也已正德十五年秋毅皇帝洪都凱旋渡江駐蹕臨池顧問人侈談之既而水漸涸沙泥草莽葢二十四年矣行者惻焉嘉靖壬寅臘月雲以復命道江上登山乃邑侯盧溪李尹隆仲褁茗來會容與終日言念舊蹟龍池是先知僧綱圓濟才屬之然亦未意其能速成也癸卯四月既望濟來欣欣然告我曰龍池興矣願丐一言記其事且曰下有石穴亦通大江池既濬召匠石開兩階碧檻朱闌神靈桓桓而逾舊觀矣矦實捐俸為之始于二月二日丙子成于三月七日辛亥成之夕大雷雨水盈數尺厥明少長環立相慶歡聲隆隆咸曰是我守令之澤也走白李矦矦曰是龍王之靈也天之貺也民之祉也太守之慶也於棟何有俾濟屬雲記之雲獲偕兹遊幸托名于山復為詩以數之詩曰赫赫龍祠奠彼南服大旱作霖為下民福龍池洋洋不遠之復孰湮孰開神明於告龍有變化雲行雨施蟄以藏身神哉斯池旬宣之澤河潤千里滌之揚之樂只君子人之恒言有龍則靈聖作物覩天下文明事繫民瘼我心則憂胡為泥中而作神羞惟龍升天惟雲觸石茫洋玄間深山大澤兹江兹山實蛟龍之宅我詩于碑乃頌其成龍乎龍乎與時偕行宋韓蘄王廟記清河濱李楷撰金山血食為有司所祀者惟蘄王一人然其生平本傳未有碑游人無所稽余每過祠下輒嘆之嗟乎蘄王之贈不在於督軍行陣之日乃在於西湖蕭散之後不在於論功中興之時而在於晚好釋老之餘生未盡其力死未竭其忠雖以王爵榮之差過於鄂國宋人知公而不能用公亦何益哉夫宋人之差有可觀者戰功也其傷心之痛貽恨於千古者和議也天下之論將者莫不曰張韓劉岳所切齒不忘者莫不曰秦檜是其功罪皎然三尺之童子皆知之宋人詘將而主和吾誠不知其何心則夫蘄王之未盡其力未竭其忠者天也嗟乎天何嘗亡宋哉宋自亡耳宋之可以不亡者以有將也將之可以存宋者以有君也君不知其賢而棄之不可謂之有君知其賢矣任以權矣所至有功矣天下信之矣此君將相得之秋也卒以相之故而撓之有君無相亦不可謂之有君君不自存以底於亡天何心哉若韓公者吾又為之流涕焉惟公戰功之大略能勝金人而挫之金山大儀楚州凡三捷其大過人者抗疏詆秦檜之誤國又攖檜怒力剖岳飛之寃獄它如削平方臘於青溪峒蕩滅劉忠於長沙定苗劉之亂而帝為握手流涕靖李復之寇而宿遷餘黨悉降生平嗜義輕財賜賚悉分將士持軍嚴重與士卒同甘苦故能設伏出奇以寡勝眾累立戰伐之功惜也杜門謝客絕口兵事跨驢携酒縱遊西湖以自樂平時將佐皆罕得見其面乃於晚年好釋老之學自號清凉居士疾革之日戒家人勿諱忠字諱忠不言是忘忠也若韓公者不謂之純臣不可矣老於牗下無武穆之痛暮年恬退又能加子儀一等雖天下徧祀之可也今以其金山一事詳言之當兀术之自廣德趣臨安也公已屯兵鎮江邀其歸路兀术至約戰求渡梁夫人親執桴鼓金兵終不能渡相持黃天蕩者四十八日公以海艦泊金山下預用鐵綆貫大鈎授驍健者敵舟澡而前公分海舟為兩道出其背每縋一綆則曳一舟沉之能使兀术窮蹙哀請公要要以還我兩宮復我疆土兀术語塞馳去葢初戰於江南之岸再戰於水中海艦金山未嘗用兵也其伏百人於廟中伏百人岸㶆者設奇兵以鼓聲為約公計以為敵至必登金山廟窺我虛實俟其來岸兵先入廟兵繼出以合擊之果有五騎入廟廟兵先鼓而出僅獲二人而兀术蟒袍玉帶堕而復馳詳史氏之言廟以金山稱非於金山之廟也五騎與堕馳皆非金山之事當是江之南岸高阜處為廟祀金山之神不然金山乃在南𡶨不隔江水唐人張祜之詩亦不為工矣今祀蘄王於金山之上猶可彷彿其泊海舟用鐵綆之槩因是以推大儀背嵬軍各長斧上椹人胸下砍馬足公以勁騎四面蹂躪卒擒金別將撻孛也等二百餘人俘獲無算劉豫入祀公引兵圖淮陽圍其城卒能勒兵向敵殺兀术劉倪之前導教兵激厲山陽遂為重鎮嗟乎如公者尚可多得哉凡有天下者不患無將患無名將不患無名將患任將之不專夫如是則後於宋者宜祀公以風天下之為將者宋雖亡蘄王自不亡也康熈皇上登覽金山集僧明真記錄歲次甲子二十三年十月二十四日皇上登覽金山方丈和尚超淨普領闔山大眾僧俯伏恭迎聖駕至山登岸問和尚汝是住持麽旁僧奏他是方丈和尚住持是僧人上問和尚你是何方人和尚奏是江西上云引道和尚即旁行引道上路問你是宗門麽麼和尚奏是宗門問是那一派奏是磬山一脉玉林和尚姪孫問是何法名奏法名超淨問多大出家奏十六歲出家上行至大殿闔山大眾僧排立兩旁舉香讚和尚奏萬歲拈香上即拈香禮佛畢云遊山和尚奏闔山僧眾朝賀萬歲眾僧俱向上班齊和尚首領一同朝和九拜口呼萬歲萬歲萬萬歲禮畢上云遊山和尚即引道上遶殿而出至第一泉僧獻水上問好麽麼僧奏甚是清凉上飲些些云果然好水即命取此水煎茶上遂登山路問和尚你年多少和尚奏六十九歲問多大出家奏十六歲出家問名甚麽奏法名超淨問可曾到京奏曾到過上對王爺云聽得有個超淨上遊至無樑殿旁僧云此處原有座無樑殿久被山石墜下打去了旁臣云誰知有殿無殿上即以手自點胸復拍和尚肩云這個老和尚曉得和尚點首奏是上隨行指一草云是甚麽和尚奏是萬年青上微哂之遂登寶塔問老和尚能上麽和尚奏還能上云引道上即登塔層層禮佛直拜至頂上如是敬佛和尚感歎曰真乃佛心天子今古罕聞遂奏萬歲出塔外看看上遂出外倚欄四望見其江濤廣濶船隻紛然時龍顏大悅快觀一會暢然下塔上塔者甚多和尚未能下塔上問老和尚何在遂詔和尚聽忙然下急促不覺撞至上背王爺以手隔之上知轉身云這老和尚好徤硬和尚遂啟奏萬歲登畱雲亭看看上至畱雲亭見其破敗不堪哂而下山至公廳坐定命大臣云萬歲用午宴和尚領眾且廻和尚云禪堂恭辦有齋供獻萬歲大臣云萬歲不用你們齋且廻